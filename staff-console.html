/* =========================================================================
   FILE SYSTEM — shared helpers
   The virtual file tree:
     Officers/{warrant or name}/...   scope=officer, scopeId=staff.id
     Teams/{team name}/...            scope=team,    scopeId=team name
     Global/...                       scope=global,  scopeId=""
   Blobs live in IndexedDB keyed by file id; metadata lives in the store.
   ========================================================================= */
const FILE_CAP_BYTES = 8 * 1024 * 1024;   // 8 MB per file — IndexedDB can take it

// Read a File object to a data URL
function fileToDataUrl(file){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("read failed"));
    r.readAsDataURL(file);
  });
}
// Trigger a browser download from a data URL
function downloadDataUrl(dataUrl, name){
  const a = document.createElement("a");
  a.href = dataUrl; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
}
// Human label for a file's scope
function scopeLabel(meta, staff){
  if (meta.scope === "officer") {
    const s = staff.find(x => x.id === meta.scopeId);
    return s ? `Officers / ${s.name}` : "Officers / (removed)";
  }
  if (meta.scope === "team") return `Teams / ${meta.scopeId}`;
  return "Global";
}
// The on-disk folder path this file would occupy in an exported workspace
function workspacePath(meta, staff){
  const safe = s => String(s || "").replace(/[\/\\:*?"<>|]/g, "-").trim();
  if (meta.scope === "officer") {
    const s = staff.find(x => x.id === meta.scopeId);
    const folder = s ? (s.warrantNumber || s.name) : meta.scopeId;
    return `Officers/${safe(folder)}/${safe(meta.name)}`;
  }
  if (meta.scope === "team") return `Teams/${safe(meta.scopeId)}/${safe(meta.name)}`;
  return `Global/${safe(meta.name)}`;
}

// A reusable drop zone. onFiles receives a FileList.
function DropZone({ onFiles, children, className = "", accept }){
  const [over, setOver] = React.useState(false);
  return (
    <div
      onDragOver={e => { e.preventDefault(); setOver(true); }}
      onDragLeave={e => { e.preventDefault(); setOver(false); }}
      onDrop={e => {
        e.preventDefault(); setOver(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length) onFiles(e.dataTransfer.files);
      }}
      className={`${className} ${over ? "ring-2 ring-brand-400 ring-offset-2 ring-offset-canvas dark:ring-offset-ink-900" : ""} transition`}>
      {typeof children === "function" ? children(over) : children}
    </div>
  );
}

/* =========================================================================
   FILES VIEW — the virtual file system
   ========================================================================= */
function FilesView({ query }){
  const { store, addFileMeta, removeFileMeta, renameFile } = useStore();
  const { staff, files } = store;

  // selected node in the tree: { type: "root"|"officers"|"teams"|"global"|"officer"|"team", id }
  const [sel, setSel] = React.useState({ type: "global", id: "" });
  const [busy, setBusy] = React.useState(false);
  const [expanded, setExpanded] = React.useState({ officers: true, teams: true });
  const inputRef = React.useRef(null);

  const teams = React.useMemo(() => {
    const set = new Set(staff.map(s => s.team).filter(Boolean));
    return [...set].sort();
  }, [staff]);

  // Which files belong to the current selection
  const visibleFiles = React.useMemo(() => {
    let list = files;
    if (sel.type === "officer")  list = files.filter(f => f.scope === "officer" && f.scopeId === sel.id);
    else if (sel.type === "team") list = files.filter(f => f.scope === "team" && f.scopeId === sel.id);
    else if (sel.type === "global") list = files.filter(f => f.scope === "global");
    else if (sel.type === "officers") list = files.filter(f => f.scope === "officer");
    else if (sel.type === "teams") list = files.filter(f => f.scope === "team");
    if (query) list = list.filter(f => f.name.toLowerCase().includes(query.toLowerCase()));
    return [...list].sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
  }, [files, sel, query]);

  // Resolve the scope/scopeId to write to from the current selection
  const targetScope = sel.type === "officer" ? { scope: "officer", scopeId: sel.id }
                    : sel.type === "team"    ? { scope: "team",    scopeId: sel.id }
                    : sel.type === "global"  ? { scope: "global",  scopeId: "" }
                    : null;   // "officers"/"teams" roots aren't writable — pick a child

  // Ingest a FileList into a given scope
  const ingest = async (fileList, scope) => {
    if (!scope) { alert("Pick an officer, a team, or Global before dropping files."); return; }
    setBusy(true);
    try {
      for (const file of Array.from(fileList)) {
        if (file.size > FILE_CAP_BYTES) {
          alert(`"${file.name}" is ${fmt.bytes(file.size)} — over the ${fmt.bytes(FILE_CAP_BYTES)} cap. Skipped.`);
          continue;
        }
        const dataUrl = await fileToDataUrl(file);
        const id = uid("fil");
        await idbPut(id, dataUrl);
        addFileMeta({ id, name: file.name, size: file.size, type: file.type, ...scope });
      }
    } catch (err) {
      alert("Upload failed: " + err.message);
    } finally {
      setBusy(false);
    }
  };

  const onPickFiles = (e) => {
    if (e.target.files && e.target.files.length) ingest(e.target.files, targetScope);
    e.target.value = "";
  };

  const openFile = async (meta) => {
    try {
      const dataUrl = await idbGet(meta.id);
      if (!dataUrl) { alert("This file's contents are missing from storage."); return; }
      downloadDataUrl(dataUrl, meta.name);
    } catch (err) { alert("Could not open file: " + err.message); }
  };
  const deleteFile = async (meta) => {
    if (!confirm(`Delete "${meta.name}"?`)) return;
    await idbDelete(meta.id);
    removeFileMeta(meta.id);
  };

  // Counts per node for the tree badges
  const officerFileCount = id => files.filter(f => f.scope === "officer" && f.scopeId === id).length;
  const teamFileCount = name => files.filter(f => f.scope === "team" && f.scopeId === name).length;
  const globalCount = files.filter(f => f.scope === "global").length;

  // Officers that actually have files, plus the selected one even if empty
  const officersWithFiles = staff.filter(s => officerFileCount(s.id) > 0 || (sel.type === "officer" && sel.id === s.id));

  const selTitle = sel.type === "global" ? "Global"
    : sel.type === "officers" ? "All officer files"
    : sel.type === "teams" ? "All team files"
    : sel.type === "officer" ? (staff.find(s => s.id === sel.id)?.name || "Officer")
    : sel.type === "team" ? sel.id
    : "Files";

  const NodeRow = ({ icon, label, count, active, depth = 0, onClick, accent }) => (
    <button onClick={onClick}
            className={`w-full flex items-center gap-2 pr-2 py-1.5 rounded-lg text-[12.5px] transition ${active ? "bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-300 font-semibold" : "text-ink-700 dark:text-ink-300 hover:bg-canvas dark:hover:bg-ink-900/40"}`}
            style={{ paddingLeft: 8 + depth * 14 }}>
      <span className={accent || "text-ink-400"}>{icon}</span>
      <span className="flex-1 text-left truncate">{label}</span>
      {count != null && count > 0 && (
        <span className={`text-[10.5px] tnum px-1.5 rounded-full ${active ? "bg-white/50 dark:bg-ink-900/40" : "bg-canvas dark:bg-ink-800"}`}>{count}</span>
      )}
    </button>
  );

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      <div className="grid grid-cols-12 gap-6">
        {/* Tree */}
        <div className="col-span-12 lg:col-span-4 xl:col-span-3">
          <Card noPad>
            <div className="px-3 py-3">
              <div className="px-2 pb-2 text-[10.5px] uppercase tracking-wider text-ink-500 font-bold">Workspace</div>

              {/* Global */}
              <NodeRow icon={<Ic.globe width="15" height="15"/>} label="Global" count={globalCount}
                       accent="text-teal-500"
                       active={sel.type === "global"} onClick={() => setSel({ type: "global", id: "" })}/>

              {/* Officers */}
              <div className="mt-1">
                <div className="flex items-center">
                  <button onClick={() => setExpanded(e => ({ ...e, officers: !e.officers }))}
                          className="p-1 text-ink-400 hover:text-ink-600">
                    <Ic.chev width="13" height="13" className={expanded.officers ? "" : "-rotate-90"}/>
                  </button>
                  <button onClick={() => setSel({ type: "officers", id: "" })}
                          className={`flex-1 flex items-center gap-2 pr-2 py-1.5 rounded-lg text-[12.5px] transition ${sel.type === "officers" ? "bg-brand-50 dark:bg-brand-900/30 text-brand-600 font-semibold" : "text-ink-700 dark:text-ink-300 hover:bg-canvas dark:hover:bg-ink-900/40"}`}>
                    <Ic.users2 width="15" height="15" className="text-violet-500"/>
                    <span className="flex-1 text-left">Officers</span>
                    <span className="text-[10.5px] tnum text-ink-400">{files.filter(f => f.scope === "officer").length}</span>
                  </button>
                </div>
                {expanded.officers && (
                  <div className="mt-0.5">
                    {officersWithFiles.length === 0 && (
                      <div className="text-[11.5px] text-ink-400 pl-9 py-1">Drop a file on an officer to start.</div>
                    )}
                    {officersWithFiles.map(s => (
                      <NodeRow key={s.id} depth={1.6}
                               icon={<Ic.folder width="14" height="14"/>}
                               label={s.name} count={officerFileCount(s.id)}
                               active={sel.type === "officer" && sel.id === s.id}
                               onClick={() => setSel({ type: "officer", id: s.id })}/>
                    ))}
                  </div>
                )}
              </div>

              {/* Teams */}
              <div className="mt-1">
                <div className="flex items-center">
                  <button onClick={() => setExpanded(e => ({ ...e, teams: !e.teams }))}
                          className="p-1 text-ink-400 hover:text-ink-600">
                    <Ic.chev width="13" height="13" className={expanded.teams ? "" : "-rotate-90"}/>
                  </button>
                  <button onClick={() => setSel({ type: "teams", id: "" })}
                          className={`flex-1 flex items-center gap-2 pr-2 py-1.5 rounded-lg text-[12.5px] transition ${sel.type === "teams" ? "bg-brand-50 dark:bg-brand-900/30 text-brand-600 font-semibold" : "text-ink-700 dark:text-ink-300 hover:bg-canvas dark:hover:bg-ink-900/40"}`}>
                    <Ic.users2 width="15" height="15" className="text-sky2-500"/>
                    <span className="flex-1 text-left">Teams</span>
                    <span className="text-[10.5px] tnum text-ink-400">{files.filter(f => f.scope === "team").length}</span>
                  </button>
                </div>
                {expanded.teams && (
                  <div className="mt-0.5">
                    {teams.map(t => (
                      <NodeRow key={t} depth={1.6}
                               icon={<Ic.folder width="14" height="14"/>}
                               label={t} count={teamFileCount(t)}
                               active={sel.type === "team" && sel.id === t}
                               onClick={() => setSel({ type: "team", id: t })}/>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="px-4 py-3 border-t border-softline dark:border-ink-800 text-[11px] text-ink-500 leading-relaxed">
              Files live in this browser's IndexedDB. Use <span className="font-semibold">Export workspace</span> in Settings to get a real folder tree as a zip.
            </div>
          </Card>
        </div>

        {/* File list + drop area */}
        <div className="col-span-12 lg:col-span-8 xl:col-span-9">
          <Card noPad>
            <div className="flex items-center justify-between gap-3 px-6 pt-5 pb-3">
              <div>
                <div className="h-eyebrow mb-1">{sel.type === "officer" ? "Officer folder" : sel.type === "team" ? "Team folder" : sel.type === "global" ? "Shared" : "All files"}</div>
                <h3 className="font-display font-bold text-[17px] text-ink-900 dark:text-ink-100">{selTitle}</h3>
              </div>
              {targetScope && (
                <Button size="sm" onClick={() => inputRef.current?.click()} disabled={busy}>
                  <Ic.upload width="14" height="14"/> {busy ? "Uploading…" : "Add files"}
                </Button>
              )}
              <input ref={inputRef} type="file" multiple onChange={onPickFiles} className="hidden"/>
            </div>

            {/* Drop target */}
            {targetScope ? (
              <DropZone onFiles={fl => ingest(fl, targetScope)} className="mx-6 mb-4 rounded-xl">
                {over => (
                  <div className={`border-2 border-dashed rounded-xl py-7 text-center transition ${over ? "border-brand-400 bg-brand-50/60 dark:bg-brand-900/20" : "border-softline dark:border-ink-800"}`}>
                    <div className="w-10 h-10 mx-auto rounded-xl bg-brand-50 dark:bg-brand-900/30 flex items-center justify-center text-brand-500 mb-2">
                      <Ic.upload width="18" height="18"/>
                    </div>
                    <div className="text-[13px] font-semibold text-ink-700 dark:text-ink-300">
                      {over ? "Drop to file here" : `Drag files into ${selTitle}`}
                    </div>
                    <div className="text-[11.5px] text-ink-500 mt-0.5">or use Add files · up to {fmt.bytes(FILE_CAP_BYTES)} each</div>
                  </div>
                )}
              </DropZone>
            ) : (
              <div className="mx-6 mb-4 px-4 py-3 rounded-xl bg-canvas dark:bg-ink-900/40 text-[12px] text-ink-500">
                Pick a specific officer, team, or Global on the left to add files there. This is a combined view.
              </div>
            )}

            {/* File rows */}
            {visibleFiles.length === 0 ? (
              <div className="py-10 text-center text-[13px] text-ink-500">No files here yet.</div>
            ) : (
              <div className="divide-y divide-softline dark:divide-ink-800/60 border-t border-softline dark:border-ink-800">
                {visibleFiles.map(f => (
                  <div key={f.id} className="flex items-center gap-3 px-6 py-3 hover:bg-canvas/60 dark:hover:bg-ink-900/30 transition">
                    <div className="w-10 h-10 rounded-xl bg-violet-50 dark:bg-violet-900/30 flex items-center justify-center text-violet-500 shrink-0">
                      <Ic.file width="17" height="17"/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-[13.5px] truncate">{f.name}</div>
                      <div className="text-[11.5px] text-ink-500 mt-0.5 font-mono truncate">
                        {workspacePath(f, staff)} · {fmt.bytes(f.size)} · {fmt.dateTime(f.uploadedAt)}
                      </div>
                    </div>
                    <IconBtn onClick={() => openFile(f)} title="Download"><Ic.download width="15" height="15"/></IconBtn>
                    <IconBtn onClick={() => {
                      const name = prompt("Rename file", f.name);
                      if (name && name.trim()) renameFile(f.id, name.trim());
                    }} title="Rename"><Ic.edit width="15" height="15"/></IconBtn>
                    <IconBtn onClick={() => deleteFile(f)} title="Delete"><Ic.trash width="15" height="15"/></IconBtn>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   CAPABILITIES VIEW
   The operational grid: every officer × every capability, tri-plus-state.
   Click a cell to cycle Yes → Booked → No → Not recorded.
   ========================================================================= */
function capTone(state){
  return CAP_STATE_META[state]?.tone || "neutral";
}
function CapabilitiesView(){
  const { store, setCapability } = useStore();
  const { staff, settings } = store;

  const archivedHubs = settings.archivedHubs || [];
  const activeHubs = (settings.hubs || HUBS).filter(h => !archivedHubs.includes(h));

  const [teamFilter, setTeamFilter] = React.useState("all");
  const [hubFilter, setHubFilter] = React.useState("all");
  const [hideResigned, setHideResigned] = React.useState(true);

  const rows = React.useMemo(() => {
    return staff.filter(s => {
      if (hideResigned && s.resigned) return false;
      if (teamFilter !== "all" && s.team !== teamFilter) return false;
      if (hubFilter !== "all" && s.hub !== hubFilter) return false;
      return true;
    }).sort((a, b) => (a.lastName || "").localeCompare(b.lastName || ""));
  }, [staff, teamFilter, hubFilter, hideResigned]);

  // Coverage per capability across the visible rows
  const coverage = React.useMemo(() => {
    return CAPABILITIES.map(cap => {
      const counts = { yes: 0, booked: 0, no: 0, unknown: 0 };
      rows.forEach(s => { counts[(s.capabilities || {})[cap.key] || "unknown"]++; });
      const denom = rows.length || 1;
      return { cap, counts, pctYes: Math.round((counts.yes / denom) * 100) };
    });
  }, [rows]);

  const cycle = (s, capKey) => {
    const cur = (s.capabilities || {})[capKey] || "unknown";
    const order = ["yes", "booked", "no", "unknown"];
    const next = order[(order.indexOf(cur) + 1) % order.length];
    setCapability(s.id, capKey, next);
  };

  const CapCell = ({ state, onClick }) => {
    const meta = CAP_STATE_META[state] || CAP_STATE_META.unknown;
    const cls = state === "yes"     ? "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300"
              : state === "booked"  ? "bg-amber2-100 text-amber2-600 dark:bg-amber2-900/30"
              : state === "no"      ? "bg-rose-100 text-rose-600 dark:bg-rose-900/30"
              : "bg-canvas dark:bg-ink-900/40 text-ink-400 border border-dashed border-ink-300";
    return (
      <button onClick={onClick} title={`${meta.label} — click to change`}
              className={`w-14 h-7 rounded-lg text-[10.5px] font-bold transition hover:scale-105 ${cls}`}>
        {meta.chip}
      </button>
    );
  };

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      {/* Coverage KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 mb-6">
        {coverage.map(({ cap, counts, pctYes }) => (
          <div key={cap.key} className="card-host bg-card border border-softline dark:border-ink-800/60 rounded-xl2 shadow-card p-4">
            <div className="text-[11px] text-ink-500 font-semibold uppercase tracking-wider">{cap.label}</div>
            <div className="font-display font-extrabold text-[22px] text-ink-900 dark:text-ink-100 tnum mt-1">{pctYes}%</div>
            <div className="text-[10.5px] text-ink-500 mt-0.5">{counts.yes} yes · {counts.booked} booked</div>
            <div className="mt-2 h-1.5 rounded-full bg-canvas dark:bg-ink-900/60 overflow-hidden flex">
              <div className="h-full bg-emerald-500" style={{ width: `${(counts.yes / (rows.length||1))*100}%` }}/>
              <div className="h-full bg-amber2-500" style={{ width: `${(counts.booked / (rows.length||1))*100}%` }}/>
              <div className="h-full bg-rose-500" style={{ width: `${(counts.no / (rows.length||1))*100}%` }}/>
            </div>
          </div>
        ))}

/* =========================================================================
   IMPORT VIEW — drag an E-section spreadsheet, review the diff, apply
   ========================================================================= */
function ImportView({ onNav }){
  const { store, applyImport } = useStore();
  const { staff, imports } = store;

  const [stage, setStage] = React.useState("idle");   // idle | parsing | review | done
  const [parsed, setParsed] = React.useState(null);
  const [diff, setDiff] = React.useState(null);
  const [fileName, setFileName] = React.useState("");
  const [error, setError] = React.useState("");
  const inputRef = React.useRef(null);

  const handleFiles = async (fileList) => {
    const file = fileList[0];
    if (!file) return;
    if (!/\.xlsx?$/i.test(file.name)) {
      setError("That's not a spreadsheet. Drop an .xlsx file exported from the E-section sheet.");
      return;
    }
    setError("");
    setFileName(file.name);
    setStage("parsing");
    try {
      const people = await readEsectionFile(file);
      const d = diffImport(people, staff);
      setParsed(people);
      setDiff(d);
      setStage("review");
    } catch (err) {
      setError(err.message || "Could not read that file.");
      setStage("idle");
    }
  };

  const apply = () => {
    applyImport(diff, fileName);
    setStage("done");
  };
  const reset = () => {
    setStage("idle"); setParsed(null); setDiff(null); setFileName(""); setError("");
  };

  // Build a per-row change summary for the review table
  const fieldChanges = (before, after) => {
    const changes = [];
    const cmp = (label, b, a) => { if ((b || "") !== (a || "") && a) changes.push(`${label}: ${b || "—"} → ${a}`); };
    cmp("Warrant", before.warrantNumber, after.warrantNumber);
    cmp("Role", before.role, after.role);
    cmp("Team", before.team, after.team);
    cmp("Hub", before.hub, after.hub);
    if (before.acting !== after.acting) changes.push(`Acting: ${before.acting ? "yes" : "no"} → ${after.acting ? "yes" : "no"}`);
    if (before.resigned !== after.resigned) changes.push(`Resigned/moved: ${before.resigned ? "yes" : "no"} → ${after.resigned ? "yes" : "no"}`);
    // capability deltas
    CAPABILITIES.forEach(cap => {
      const b = (before.capabilities || {})[cap.key] || "unknown";
      const a = (after.capabilities || {})[cap.key] || "unknown";
      if (b !== a) changes.push(`${cap.label}: ${CAP_STATE_META[b].chip} → ${CAP_STATE_META[a].chip}`);
    });
    return changes;
  };

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      {stage === "idle" && (
        <div className="max-w-3xl">
          <DropZone onFiles={handleFiles} className="rounded-xl2">
            {over => (
              <div className={`border-2 border-dashed rounded-xl2 py-16 text-center transition ${over ? "border-brand-400 bg-brand-50/60 dark:bg-brand-900/20" : "border-softline dark:border-ink-800 bg-card"}`}>
                <div className="w-16 h-16 mx-auto rounded-2xl bg-brand-50 dark:bg-brand-900/30 flex items-center justify-center text-brand-500 mb-4">
                  <Ic.upload width="28" height="28"/>
                </div>
                <div className="font-display font-bold text-[17px] text-ink-900 dark:text-ink-100">
                  {over ? "Drop the spreadsheet" : "Drag your E-section spreadsheet here"}
                </div>
                <div className="text-[13px] text-ink-500 mt-1.5 max-w-md mx-auto">
                  An .xlsx export with the usual columns — Name, Warrant Number, Role, Hub, Department, capability columns and Note.
                  Both the DRT and RIT blocks are read.
                </div>
                <div className="mt-5">
                  <Button onClick={() => inputRef.current?.click()}><Ic.upload width="14" height="14"/> Choose a file</Button>
                  <input ref={inputRef} type="file" accept=".xlsx,.xls" className="hidden"
                         onChange={e => { if (e.target.files.length) handleFiles(e.target.files); e.target.value = ""; }}/>
                </div>
              </div>
            )}
          </DropZone>
          {error && <div className="mt-3 px-4 py-3 rounded-xl bg-rose-50 dark:bg-rose-900/20 text-rose-600 text-[13px]">{error}</div>}

          <div className="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-3 text-[12.5px]">
            <div className="bg-card border border-softline dark:border-ink-800 rounded-xl p-4">
              <div className="font-semibold text-ink-900 dark:text-ink-100 mb-1">Matches on warrant number</div>
              <div className="text-ink-500">Existing officers are updated in place. Names can change spelling without creating duplicates.</div>
            </div>
            <div className="bg-card border border-softline dark:border-ink-800 rounded-xl p-4">
              <div className="font-semibold text-ink-900 dark:text-ink-100 mb-1">Nothing is deleted</div>
              <div className="text-ink-500">Officers missing from the new sheet are kept and flagged, not removed.</div>
            </div>
            <div className="bg-card border border-softline dark:border-ink-800 rounded-xl p-4">
              <div className="font-semibold text-ink-900 dark:text-ink-100 mb-1">You review before it lands</div>
              <div className="text-ink-500">Added, updated and missing are all shown. Nothing changes until you confirm.</div>
            </div>
          </div>

          {imports && imports.length > 0 && (
            <Card title="Import history" className="mt-6">
              <div className="space-y-2">
                {imports.slice(0, 6).map(imp => (
                  <div key={imp.id} className="flex items-center gap-3 text-[12.5px] py-1.5">
                    <Ic.history width="15" height="15" className="text-ink-400"/>
                    <span className="font-mono text-ink-500">{fmt.dateTime(imp.at)}</span>
                    <span className="font-medium truncate flex-1">{imp.fileName}</span>
                    <Pill tone="success">+{imp.added}</Pill>
                    <Pill tone="brand">~{imp.updated}</Pill>
                    {imp.missing.length > 0 && <Pill tone="amber">{imp.missing.length} missing</Pill>}
                  </div>
                ))}
              </div>
            </Card>
          )}
        </div>
      )}

      {stage === "parsing" && (
        <div className="py-24 text-center">
          <div className="boot-dot mx-auto mb-3"/>
          <div className="text-[13px] text-ink-500">Reading {fileName}…</div>
        </div>
      )}

      {stage === "review" && diff && (
        <div>
          <div className="flex items-center justify-between gap-4 mb-5 flex-wrap">
            <div>
              <div className="h-eyebrow mb-1">Review · {fileName}</div>
              <h2 className="font-display font-extrabold text-[20px] text-ink-900 dark:text-ink-100">
                {diff.added.length} new · {diff.updated.length} updated · {diff.missing.length} not in this file
              </h2>
            </div>
            <div className="flex gap-2">
              <Button variant="ghost" onClick={reset}>Cancel</Button>
              <Button onClick={apply}><Ic.check width="14" height="14"/> Apply this import</Button>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Added */}
            <Card title={`New officers (${diff.added.length})`} eyebrow="Will be created" noPad>
              {diff.added.length === 0 ? (
                <div className="py-8 text-center text-[12.5px] text-ink-500">Nobody new in this file.</div>
              ) : (
                <div className="divide-y divide-softline dark:divide-ink-800/60 max-h-[52vh] overflow-y-auto">
                  {diff.added.map((p, i) => (
                    <div key={i} className="px-5 py-2.5 flex items-center gap-3">
                      <Avatar name={p.name} photoId={p.photoId} size={32}/>
                      <div className="min-w-0">
                        <div className="font-semibold text-[13px] truncate">{p.name}</div>
                        <div className="text-[11px] text-ink-500 font-mono">{p.warrantNumber || "no warrant"} · {p.role} · {p.team} · {p.hub}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </Card>

            {/* Updated */}
            <Card title={`Updated (${diff.updated.length})`} eyebrow="Fields will change" noPad>
              {diff.updated.length === 0 ? (
                <div className="py-8 text-center text-[12.5px] text-ink-500">No changes to existing officers.</div>
              ) : (
                <div className="divide-y divide-softline dark:divide-ink-800/60 max-h-[52vh] overflow-y-auto">
                  {diff.updated.map((u, i) => {
                    const changes = fieldChanges(u.before, u.after);
                    return (
                      <div key={i} className="px-5 py-2.5">
                        <div className="flex items-center gap-2.5">
                          <Avatar name={u.after.name} size={30}/>
                          <div className="font-semibold text-[13px]">{u.after.name}</div>
                        </div>
                        {changes.length === 0 ? (
                          <div className="text-[11px] text-ink-400 mt-1 pl-10">No field changes — refreshed only.</div>
                        ) : (
                          <ul className="mt-1 pl-10 space-y-0.5">
                            {changes.map((c, ci) => <li key={ci} className="text-[11px] text-ink-600 dark:text-ink-400">{c}</li>)}
                          </ul>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>

            {/* Missing */}
            <Card title={`Not in this file (${diff.missing.length})`} eyebrow="Kept and flagged" noPad>
              {diff.missing.length === 0 ? (
                <div className="py-8 text-center text-[12.5px] text-ink-500">Everyone in the dashboard is in this file.</div>
              ) : (
                <div className="divide-y divide-softline dark:divide-ink-800/60 max-h-[52vh] overflow-y-auto">
                  {diff.missing.map((m, i) => (
                    <div key={i} className="px-5 py-2.5 flex items-center gap-3">
                      <Avatar name={m.name} size={32}/>
                      <div className="min-w-0">
                        <div className="font-semibold text-[13px] truncate">{m.name}</div>
                        <div className="text-[11px] text-ink-500 font-mono">{m.warrantNumber || "no warrant"}</div>
                      </div>
                      <Pill tone="amber" className="ml-auto">Flag</Pill>
                    </div>
                  ))}
                </div>
              )}
            </Card>
          </div>

          <div className="mt-4 px-4 py-3 rounded-xl bg-canvas dark:bg-ink-900/40 text-[12px] text-ink-500">
            Updates merge spreadsheet fields onto existing records — tasks, files, notes you've added in the dashboard are kept.
            Capabilities are taken from the spreadsheet. Missing officers stay put with an "not in latest import" flag you can see on the Staff list.
          </div>
        </div>
      )}

      {stage === "done" && (
        <div className="max-w-lg py-16 text-center mx-auto">
          <div className="w-16 h-16 mx-auto rounded-2xl bg-emerald-50 dark:bg-emerald-900/20 flex items-center justify-center text-emerald-500 mb-4">
            <Ic.check width="30" height="30"/>
          </div>
          <h2 className="font-display font-extrabold text-[20px] text-ink-900 dark:text-ink-100">Import applied</h2>
          <div className="text-[13px] text-ink-500 mt-1.5">
            {diff.added.length} added, {diff.updated.length} updated{diff.missing.length > 0 ? `, ${diff.missing.length} flagged as missing` : ""}.
          </div>
          <div className="mt-6 flex gap-2 justify-center">
            <Button variant="outline" onClick={reset}>Import another</Button>
            <Button onClick={() => onNav("staff")}>Go to Staff</Button>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   REPORTS VIEW
   ========================================================================= */
function ReportsView(){
  const { store } = useStore();
  const { staff, tasks, settings } = store;

  const archivedHubs = settings.archivedHubs || [];
  const activeHubs = (settings.hubs || HUBS).filter(h => !archivedHubs.includes(h));

  const [teamFilter, setTeamFilter] = React.useState("");
  const [hubFilter, setHubFilter] = React.useState("");

  const filteredStaff = staff.filter(s =>
    (!teamFilter || s.team === teamFilter) &&
    (!hubFilter || s.hub === hubFilter));
  const filteredIds = new Set(filteredStaff.map(s => s.id));
  const filteredTasks = tasks.filter(t => !t.assigneeId || filteredIds.has(t.assigneeId));

  const byRole = React.useMemo(() => {
    const m = {};
    filteredStaff.forEach(s => { m[s.role] = (m[s.role] || 0) + 1; });
    return m;
  }, [filteredStaff]);

  const byHub = React.useMemo(() => {
    const m = {};
    filteredStaff.forEach(s => { m[s.hub] = (m[s.hub] || 0) + 1; });
    return m;
  }, [filteredStaff]);

  const tasksByCategory = React.useMemo(() => {
    const m = {};
    filteredTasks.filter(t => !t.completed).forEach(t => { m[t.category] = (m[t.category] || 0) + 1; });
    return m;
  }, [filteredTasks]);

  const topTags = React.useMemo(() => {
    const m = {};
    filteredStaff.forEach(s => (s.tags || []).forEach(t => m[t] = (m[t] || 0) + 1));
    return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 10);
  }, [filteredStaff]);

  // Restriction breakdown — resigned/moved are excluded since they're a separate concern
  const restrictionSplit = React.useMemo(() => {
    const live = filteredStaff.filter(s => !s.resigned);
    const restricted = live.filter(s => isOnRestriction(s));
    const free = live.filter(s => !isOnRestriction(s));
    // Per-type count for the donut
    const byType = {};
    restricted.forEach(s => {
      const t = s.restriction && s.restriction.type;
      if (t) byType[t] = (byType[t] || 0) + 1;
    });
    return {
      restricted: restricted.length,
      free: free.length,
      total: live.length,
      pct: live.length === 0 ? 0 : Math.round((restricted.length / live.length) * 100),
      byType,
      list: restricted
    };
  }, [filteredStaff]);

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      <div className="flex items-center gap-3 mb-5 flex-wrap">
        <Select value={teamFilter} onChange={setTeamFilter} placeholder="All teams" options={settings.teams || TEAMS} className="w-44"/>
        <Select value={hubFilter} onChange={setHubFilter} placeholder="All hubs" options={activeHubs} className="w-40"/>
        <div className="ml-auto text-[12px] text-ink-500">{filteredStaff.length} staff · {filteredTasks.filter(t => !t.completed).length} open tasks</div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <Card title="By role">
          <ChartView type="bar"
            data={{
              labels: Object.keys(byRole),
              datasets: [{ data: Object.values(byRole), backgroundColor: "#5765E0", borderRadius: 6, barThickness: 18 }]
            }}
            options={{ indexAxis: "y", plugins: { legend: { display: false } } }}
            height={300}
          />
        </Card>

        <Card title="By hub">
          <ChartView type="doughnut"
            data={{
              labels: Object.keys(byHub),
              datasets: [{ data: Object.values(byHub), backgroundColor: CHART_PALETTE, borderWidth: 0, spacing: 4 }]
            }}
            options={{ cutout: "60%", plugins: { legend: { position: "bottom" } } }}
            height={300}
          />
        </Card>

        <Card title="Open tasks by category">
          <ChartView type="doughnut"
            data={{
              labels: Object.keys(tasksByCategory),
              datasets: [{ data: Object.values(tasksByCategory), backgroundColor: CHART_PALETTE, borderWidth: 0, spacing: 3 }]
            }}
            options={{ cutout: "55%", plugins: { legend: { position: "right" } } }}
            height={300}
          />
        </Card>

        <Card title="Top skills">
          {topTags.length === 0 ? (
            <div className="py-8 text-center text-[13px] text-ink-500">No tags recorded yet.</div>
          ) : (
            <ChartView type="bar"
              data={{
                labels: topTags.map(([k]) => k),
                datasets: [{ data: topTags.map(([_, v]) => v), backgroundColor: "#9B7CF0", borderRadius: 6, barThickness: 16 }]
              }}
              options={{ indexAxis: "y", plugins: { legend: { display: false } } }}
              height={300}
            />
          )}
        </Card>

        <Card title="Restricted vs not restricted" eyebrow="Headline split of who's available">
          <div className="grid grid-cols-2 gap-3 mb-4">
            <div className="text-center p-3 rounded-xl bg-emerald-50 dark:bg-emerald-900/20">
              <div className="text-[11px] text-ink-500 uppercase tracking-wider mb-1">Available</div>
              <div className="font-display font-extrabold text-[28px] tnum text-emerald-600 leading-none">{restrictionSplit.free}</div>
              <div className="text-[11.5px] text-ink-500 mt-1">{restrictionSplit.total > 0 ? `${100 - restrictionSplit.pct}% of strength` : "—"}</div>
            </div>
            <div className="text-center p-3 rounded-xl bg-rose-50 dark:bg-rose-900/20">
              <div className="text-[11px] text-ink-500 uppercase tracking-wider mb-1">Restricted</div>
              <div className="font-display font-extrabold text-[28px] tnum text-rose-600 leading-none">{restrictionSplit.restricted}</div>
              <div className="text-[11.5px] text-ink-500 mt-1">{restrictionSplit.total > 0 ? `${restrictionSplit.pct}% of strength` : "—"}</div>
            </div>
          </div>
          {restrictionSplit.total > 0 && (
            <div className="h-3 rounded-full bg-canvas dark:bg-ink-800 overflow-hidden flex">
              <div className="h-full bg-emerald-500" style={{ width: `${100 - restrictionSplit.pct}%`, transition: "width .6s ease" }}/>
              <div className="h-full bg-rose-500"    style={{ width: `${restrictionSplit.pct}%`,       transition: "width .6s ease" }}/>
            </div>
          )}
        </Card>

        <Card title="Restrictions by type">
          {Object.keys(restrictionSplit.byType).length === 0 ? (
            <div className="py-8 text-center text-[13px] text-ink-500">No one is currently on a restriction.</div>
          ) : (
            <>
              <ChartView type="doughnut"
                data={{
                  labels: Object.keys(restrictionSplit.byType),
                  datasets: [{ data: Object.values(restrictionSplit.byType), backgroundColor: CHART_PALETTE, borderWidth: 0, spacing: 3 }]
                }}
                options={{ cutout: "55%", plugins: { legend: { position: "right" } } }}
                height={240}
              />
              {/* Names under each type — small font, scannable */}
              <div className="mt-3 space-y-1.5 text-[12px]">
                {Object.keys(restrictionSplit.byType).map(t => {
                  const names = restrictionSplit.list.filter(s => s.restriction && s.restriction.type === t);
                  return (
                    <div key={t} className="flex gap-2">
                      <span className="font-semibold text-ink-700 dark:text-ink-300 shrink-0">{t}</span>
                      <span className="text-ink-500 truncate">{names.map(s => s.name).join(", ")}</span>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </Card>
      </div>
    </div>
  );
}

/* =========================================================================

function SettingsView({ onNav }){
  const { store, setSetting, setMaxHubSize, setHubArchived, addHub, setPalette, addToList, removeFromList, replaceStore, resetStore, saveState } = useStore();

  const wsRef = React.useRef(null);
  const logoRef = React.useRef(null);
  const [wsBusy, setWsBusy] = React.useState(false);
  const [newHub, setNewHub] = React.useState("");

  // Logo upload — same pattern as staff photos. Blob lives in IndexedDB; we save the id.
  const handleLogoUpload = async (file) => {
    if (!file) return;
    if (!/^image\//.test(file.type)) { alert("Choose an image file (PNG, JPG, SVG)."); return; }
    if (file.size > 2 * 1024 * 1024) { alert("Logo is over 2 MB. Please pick a smaller one."); return; }
    try {
      const dataUrl = await fileToDataUrl(file);
      const newId = uid("logo");
      await idbPut(newId, dataUrl);
      if (store.settings.logoId) { try { await idbDelete(store.settings.logoId); } catch(e){} }
      setSetting("logoId", newId);
    } catch(e){ alert("Couldn't read that image: " + e.message); }
  };
  const clearLogo = async () => {
    if (store.settings.logoId) { try { await idbDelete(store.settings.logoId); } catch(e){} }
    setSetting("logoId", null);
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(store, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `staff-console-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  // Export the whole staff list to an Excel workbook that the dashboard can re-import.
  // Mirrors the round-trip spreadsheet template — same columns the parser recognises.
  const exportExcel = () => {
    if (typeof XLSX === "undefined") { alert("Spreadsheet library didn't load — check your connection."); return; }
    const headers = ["Name","Warrant","Role","Team","Hub","Acting","Resigned/Moved",
                     "Restriction","Restriction End","Started","End",
                     "Blues","Taser","Pursuit","PSU","MOE","Dirfit","EBTI","Note"];
    const capOrder = ["blues","taser","pursuit","psu","moe","dirfit","ebti"];
    const capLabel = v => ({yes:"Yes",no:"No",booked:"Booked",unknown:""}[v] || "");
    const dateStr = iso => iso ? new Date(iso).toISOString().slice(0,10) : "";
    const rows = [headers];
    store.staff.forEach(s => {
      const caps = s.capabilities || {};
      rows.push([
        s.name || "",
        s.warrantNumber || "",
        s.role || "",
        s.team || "",
        s.hub || "",
        s.acting ? "Yes" : "",
        s.resigned ? "Yes" : "",
        (s.restriction && s.restriction.type) || "",
        (s.restriction && s.restriction.endDate) ? dateStr(s.restriction.endDate) : "",
        dateStr(s.startedDate),
        dateStr(s.endDate),
        ...capOrder.map(c => capLabel(caps[c])),
        s.note || ""
      ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Column widths so the export looks tidy on open
    ws['!cols'] = [{wch:22},{wch:10},{wch:14},{wch:14},{wch:12},{wch:9},{wch:15},{wch:18},{wch:15},{wch:12},{wch:12},{wch:8},{wch:8},{wch:9},{wch:7},{wch:7},{wch:8},{wch:8},{wch:28}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Staff");
    const teamName = (store.settings.teamName || "staff").replace(/[^A-Za-z0-9]+/g, "-").toLowerCase();
    XLSX.writeFile(wb, `${teamName}-export-${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const importData = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.staff || !Array.isArray(parsed.staff)) throw new Error("Not a valid backup");
        if (confirm(`Replace current data with ${parsed.staff.length} staff and ${parsed.tasks?.length || 0} tasks?`)) {
          replaceStore(parsed);
          alert("Imported. Note: file attachments aren't in JSON backups — use the workspace zip for those.");
        }
      } catch (err) {
        alert("Import failed: " + err.message);
      }
      e.target.value = "";
    };
    reader.readAsText(f);
  };

  // Export the whole workspace as a zip with real folders: Officers/, Teams/, Global/
  // plus a _dashboard.json manifest that can restore the lot.
  const exportWorkspace = async () => {
    if (typeof JSZip === "undefined") { alert("Zip library didn't load — check your connection."); return; }
    setWsBusy(true);
    try {
      const zip = new JSZip();
      // The store itself, so a workspace zip is a full backup
      zip.file("_dashboard.json", JSON.stringify(store, null, 2));
      const readme = [
        "Staff Console workspace export",
        "",
        "This zip mirrors the dashboard's virtual file system as real folders:",
        "  Officers/<warrant or name>/   files attached to that officer",
        "  Teams/<department>/           files attached to that team",
        "  Global/                       files shared across the section",
        "",
        "_dashboard.json is a full backup. To restore: Settings > Import workspace zip,",
        "or Settings > Import from JSON for data only.",
        "",
        `Exported ${new Date().toISOString()}`
      ].join("\n");
      zip.file("README.txt", readme);

      // Pull every blob from IndexedDB and place it at its workspace path
      let missing = 0;
      for (const meta of store.files) {
        const dataUrl = await idbGet(meta.id);
        if (!dataUrl) { missing++; continue; }
        // data URL → base64 payload
        const base64 = dataUrl.split(",")[1] || "";
        zip.file(workspacePath(meta, store.staff), base64, { base64: true });
      }
      const blob = await zip.generateAsync({ type: "blob" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `staff-console-workspace-${new Date().toISOString().slice(0,10)}.zip`;
      a.click();
      if (missing > 0) alert(`Exported. ${missing} file(s) had no stored content and were skipped.`);
    } catch (err) {
      alert("Workspace export failed: " + err.message);
    } finally {
      setWsBusy(false);
    }
  };

  // Restore a workspace zip — reads _dashboard.json for metadata, re-files blobs into IndexedDB
  const importWorkspace = async (e) => {
    const f = e.target.files[0];
    if (!f) { return; }
    if (typeof JSZip === "undefined") { alert("Zip library didn't load."); e.target.value = ""; return; }
    setWsBusy(true);
    try {
      const zip = await JSZip.loadAsync(f);
      const manifestFile = zip.file("_dashboard.json");
      if (!manifestFile) throw new Error("No _dashboard.json in this zip — not a workspace export");
      const parsed = JSON.parse(await manifestFile.async("string"));
      if (!parsed.staff) throw new Error("Manifest has no staff data");
      if (!confirm(`Restore ${parsed.staff.length} staff and ${parsed.files?.length || 0} files from this workspace?`)) {
        e.target.value = ""; setWsBusy(false); return;
      }
      // Re-file every blob into IndexedDB, keyed by the metadata id
      for (const meta of (parsed.files || [])) {
        const path = workspacePath(meta, parsed.staff);
        const entry = zip.file(path);
        if (!entry) continue;
        const base64 = await entry.async("base64");
        const dataUrl = `data:${meta.type || "application/octet-stream"};base64,${base64}`;
        await idbPut(meta.id, dataUrl);
      }
      replaceStore(parsed);
      alert("Workspace restored.");
    } catch (err) {
      alert("Workspace import failed: " + err.message);
    } finally {
      setWsBusy(false);
      e.target.value = "";
    }
  };

  const fileCount = store.files.length;

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <Card title="Appearance">
          <div className="flex items-center gap-3">
            <button onClick={() => setSetting("theme", "light")}
                    className={`flex-1 p-4 rounded-xl border-2 transition ${store.settings.theme === "light" ? "border-brand-500 bg-brand-50/40" : "border-softline hover:border-brand-300"}`}>
              <Ic.sun width="20" height="20" className="mx-auto mb-2 text-amber2-500"/>
              <div className="text-[13px] font-semibold">Light</div>
              <div className="text-[11px] text-ink-500 mt-0.5">Clean and bright</div>
            </button>
            <button onClick={() => setSetting("theme", "dark")}
                    className={`flex-1 p-4 rounded-xl border-2 transition ${store.settings.theme === "dark" ? "border-brand-500 bg-brand-50/40" : "border-softline hover:border-brand-300"}`}>
              <Ic.moon width="20" height="20" className="mx-auto mb-2 text-brand-500"/>
              <div className="text-[13px] font-semibold">Dark</div>
              <div className="text-[11px] text-ink-500 mt-0.5">Easier on the eyes</div>
            </button>
          </div>
        </Card>

        <Card title="Dashboard branding" eyebrow="Shows in the header and on Excel exports">
          <div className="space-y-3">
            <Field label="Team name">
              <Input value={store.settings.teamName || ""} onChange={v => setSetting("teamName", v)} placeholder="e.g. E-section, Worthing NPT"/>
            </Field>
            <Field label="Dashboard owner">
              <Input value={store.settings.ownerName || ""} onChange={v => setSetting("ownerName", v)} placeholder="e.g. Insp. Smith"/>
            </Field>
            <Field label="Logo (optional)">
              <div className="flex items-center gap-4">
                <Logo logoId={store.settings.logoId} size={56}/>
                <div className="flex flex-col gap-1.5">
                  <input ref={logoRef} type="file" accept="image/*" onChange={e => handleLogoUpload(e.target.files[0])} className="hidden"/>
                  <div className="flex gap-2">
                    <Button size="sm" variant="outline" onClick={() => logoRef.current?.click()}>
                      <Ic.upload width="13" height="13"/> {store.settings.logoId ? "Replace logo" : "Upload logo"}
                    </Button>
                    {store.settings.logoId && <Button size="sm" variant="ghost" onClick={clearLogo}>Remove</Button>}
                  </div>
                  <div className="text-[11px] text-ink-500">PNG, JPG or SVG, under 2 MB. Replaces the badge top-left of the sidebar.</div>
                </div>
              </div>
            </Field>
            <div className="text-[11px] text-ink-500">Used in the header and exported filenames.</div>
          </div>
        </Card>

        <Card title="Colour palette" eyebrow="Three zones — header, sidebar, accent">
          <div className="space-y-4">
            <div>
              <div className="text-[11.5px] text-ink-500 mb-2 font-semibold uppercase tracking-wider">Presets</div>
              <div className="grid grid-cols-3 gap-2">
                {PALETTE_PRESETS.map(preset => {
                  const active = (store.settings.palette || {}).preset === preset.id;
                  return (
                    <button key={preset.id}
                            onClick={() => setPalette({ preset: preset.id, header: preset.header, sidebar: preset.sidebar, accent: preset.accent })}
                            className={`p-2 rounded-xl border-2 transition ${active ? "border-brand-400" : "border-softline hover:border-brand-300 dark:border-ink-800"}`}>
                      <div className="flex gap-1 mb-1.5">
                        <span className="flex-1 h-5 rounded-l" style={{ background: preset.header }}/>
                        <span className="flex-1 h-5" style={{ background: preset.sidebar }}/>
                        <span className="flex-1 h-5 rounded-r" style={{ background: preset.accent }}/>
                      </div>
                      <div className="text-[11px] font-semibold text-ink-700 dark:text-ink-300">{preset.label}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="pt-3 border-t border-softline dark:border-ink-800">
              <div className="text-[11.5px] text-ink-500 mb-2 font-semibold uppercase tracking-wider">Custom — pick each zone</div>
              <div className="grid grid-cols-3 gap-3">
                {[
                  { key: "header",  label: "Header"  },
                  { key: "sidebar", label: "Sidebar" },
                  { key: "accent",  label: "Accent"  }
                ].map(zone => (
                  <div key={zone.key}>
                    <label className="text-[11.5px] text-ink-600 dark:text-ink-400 block mb-1.5">{zone.label}</label>
                    <div className="flex items-center gap-2">
                      <input type="color"
                             value={(store.settings.palette || {})[zone.key] || "#FFFFFF"}
                             onChange={e => setPalette({ preset: "custom", [zone.key]: e.target.value })}
                             className="w-10 h-10 rounded-lg cursor-pointer border border-softline dark:border-ink-800"/>
                      <input type="text"
                             value={(store.settings.palette || {})[zone.key] || ""}
                             onChange={e => setPalette({ preset: "custom", [zone.key]: e.target.value })}
                             className="flex-1 px-2.5 py-2 text-[12.5px] font-mono rounded-lg"
                             placeholder="#FFFFFF"/>
                    </div>
                  </div>
                ))}
              </div>
              <div className="text-[11px] text-ink-500 mt-3">Header runs along the top, sidebar is the left nav, accent drives buttons, active states and charts. Saves automatically.</div>
            </div>
          </div>
        </Card>

        <Card title="Saving" eyebrow={saveState && saveState.ok ? "Your edits save automatically" : "Saving may not be working"}>
          {saveState && saveState.persistent === false ? (
            <div className="p-3 rounded-xl bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-900/40">
              <div className="text-[13px] font-semibold text-rose-700 dark:text-rose-300 mb-1">Browser storage is blocked</div>
              <div className="text-[12px] text-ink-700 dark:text-ink-300">
                This page can't write to local storage in its current location. Two common causes:
                opening the file directly with a file:// URL in a browser that blocks file-origin storage,
                or using a private / incognito window. To fix it, host the file (even on a local web server)
                or use a regular browser window. Until then, your edits won't persist.
              </div>
            </div>
          ) : saveState && saveState.ok ? (
            <div className="text-[13px] text-ink-700 dark:text-ink-300">
              <div className="flex items-center gap-2 mb-2">
                <span className="w-2 h-2 rounded-full bg-emerald-500"/>
                <span className="font-semibold">All changes saved.</span>
                {saveState.at && <span className="text-ink-500 text-[12px]">Last save: {new Date(saveState.at).toLocaleTimeString("en-GB")}</span>}
              </div>
              <div className="text-[12px] text-ink-500">
                Every edit autosaves to this browser. If you clear browser data or use private mode, you lose it — export to Excel weekly as a backup.
              </div>
            </div>
          ) : (
            <div className="p-3 rounded-xl bg-amber2-50 dark:bg-amber2-900/20 border border-amber2-200 dark:border-amber2-900/40">
              <div className="text-[13px] font-semibold text-amber2-700 dark:text-amber2-300 mb-1">Last save failed</div>
              <div className="text-[12px] text-ink-700 dark:text-ink-300">
                {saveState && saveState.reason === "quota" ? "Storage is full. Export and reset." : (saveState && saveState.message) || "Unknown error."}
              </div>
            </div>
          )}
        </Card>

        <Card title="Quick update — Excel" className="lg:col-span-2">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <div className="text-[13px] text-ink-700 dark:text-ink-300 mb-3">
                Export the staff list to Excel, amend it offline, then re-import. The export uses the same column layout the importer recognises, so a round-trip is clean.
              </div>
              <div className="space-y-2">
                <Button onClick={exportExcel} className="w-full justify-start"><Ic.download width="14" height="14"/> Export staff to Excel</Button>
                <Button variant="outline" onClick={() => onNav && onNav("import")} className="w-full justify-start"><Ic.upload width="14" height="14"/> Import from Excel…</Button>
              </div>
            </div>
            <div>
              <div className="text-[13px] text-ink-700 dark:text-ink-300 mb-3">
                A full workspace zip is the proper backup — staff, tasks, settings, training records and file attachments all together. See below.
              </div>
              <div className="space-y-2">
                <Button variant="dangerSoft" onClick={() => { if (confirm("Wipe everything? This cannot be undone.")) resetStore(); }} className="w-full justify-start">
                  <Ic.trash width="14" height="14"/> Reset to empty
                </Button>
              </div>
            </div>
          </div>
        </Card>

        <Card title="Workspace folder" className="lg:col-span-2">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <div className="text-[13px] text-ink-700 dark:text-ink-300 mb-2">
                The dashboard keeps files in this browser's IndexedDB, organised into Officers, Teams and Global folders.
                Export the workspace to get those as real folders on disk — a zip you can unzip anywhere, with a full backup inside.
              </div>
              <div className="text-[12px] text-ink-500">{fileCount} file{fileCount === 1 ? "" : "s"} currently filed.</div>
            </div>
            <div className="space-y-2">
              <Button onClick={exportWorkspace} disabled={wsBusy} className="w-full justify-start">
                <Ic.folder width="14" height="14"/> {wsBusy ? "Working…" : "Export workspace as zip"}
              </Button>
              <Button variant="outline" onClick={() => wsRef.current?.click()} disabled={wsBusy} className="w-full justify-start">
                <Ic.upload width="14" height="14"/> Import workspace zip…
              </Button>
              <input ref={wsRef} type="file" accept=".zip" onChange={importWorkspace} className="hidden"/>
            </div>
          </div>
        </Card>

        <ListEditor title="Teams" listKey="teams" items={store.settings.teams} onAdd={(v) => addToList("teams", v)} onRemove={(v) => removeFromList("teams", v)}/>
        <ListEditor title="Roles" listKey="roles" items={store.settings.roles} onAdd={(v) => addToList("roles", v)} onRemove={(v) => removeFromList("roles", v)}/>
        <ListEditor title="Availability statuses" listKey="statuses" items={store.settings.statuses} onAdd={(v) => addToList("statuses", v)} onRemove={(v) => removeFromList("statuses", v)}/>
        <ListEditor title="Restriction types" eyebrow="Secondment, long-term sick, attachment, restricted/suspended — each carries an end date" listKey="restrictionTypes" items={store.settings.restrictionTypes} onAdd={(v) => addToList("restrictionTypes", v)} onRemove={(v) => removeFromList("restrictionTypes", v)}/>
        <ListEditor title="Skills" listKey="tags" items={store.settings.tags} onAdd={(v) => addToList("tags", v)} onRemove={(v) => removeFromList("tags", v)}/>
        <ListEditor title="Task categories" listKey="categories" items={store.settings.categories} onAdd={(v) => addToList("categories", v)} onRemove={(v) => removeFromList("categories", v)}/>

        <Card title="Hubs" eyebrow="Add new hubs, archive old ones, set strength targets" className="lg:col-span-2">
          <div className="text-[12.5px] text-ink-500 mb-3">
            Archive a hub when you move on — its staff stay in the data but it drops out of your active filters. The strength target drives the under/over-strength indicator on the dashboard.
          </div>
          <div className="flex gap-2 mb-4">
            <input value={newHub} onChange={e => setNewHub(e.target.value)}
                   onKeyDown={e => { if (e.key === "Enter" && newHub.trim()) { addHub(newHub.trim()); setNewHub(""); } }}
                   placeholder="Add a hub…"
                   className="flex-1 px-3 py-2 text-[13px] rounded-xl"/>
            <Button size="sm" onClick={() => { if (newHub.trim()) { addHub(newHub.trim()); setNewHub(""); } }} disabled={!newHub.trim()}>
              <Ic.plus width="13" height="13"/> Add hub
            </Button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {(store.settings.hubs || HUBS).map(hub => {
              const archived = (store.settings.archivedHubs || []).includes(hub);
              const current = store.staff.filter(s => !s.resigned && s.hub === hub).length;
              const max = (store.settings.maxHubSizes || {})[hub] || 0;
              return (
                <div key={hub} className={`p-3 rounded-xl border ${archived ? "border-softline bg-canvas/50 dark:bg-ink-900/20 opacity-70" : "border-softline bg-canvas dark:bg-ink-900/40"}`}>
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1">
                      <div className="text-[13px] font-semibold text-ink-800 dark:text-ink-200 flex items-center gap-1.5">
                        {hub}
                        {archived && <Pill tone="neutral">archived</Pill>}
                      </div>
                      <div className="text-[11.5px] text-ink-500">{current} currently posted</div>
                    </div>
                    <Button size="xs" variant={archived ? "outline" : "ghost"}
                            onClick={() => setHubArchived(hub, !archived)}>
                      {archived ? "Unarchive" : "Archive"}
                    </Button>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-[11.5px] text-ink-500 flex-1">Strength target</span>
                    <div className="w-24">
                      <Input type="number" value={max} onChange={v => setMaxHubSize(hub, Number(v) || 0)}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>

        <Card title="About" className="lg:col-span-2">
          <div className="text-[13px] text-ink-700 dark:text-ink-300 space-y-2">
            <p>Staff Console — a tool for managing staff, tasks and training across your hubs.</p>
            <p>Everything saves to this browser. Nothing leaves your device unless you export it.</p>
            <div className="grid grid-cols-3 gap-3 mt-4 text-[12px]">
              <div className="p-3 bg-canvas dark:bg-ink-900/40 rounded-xl">
                <div className="text-ink-500 mb-0.5">Schema version</div>
                <div className="font-mono font-semibold">v{store.version}</div>
              </div>
              <div className="p-3 bg-canvas dark:bg-ink-900/40 rounded-xl">
                <div className="text-ink-500 mb-0.5">Records</div>
                <div className="font-mono font-semibold">{store.staff.length + store.tasks.length + store.files.length}</div>
              </div>
              <div className="p-3 bg-canvas dark:bg-ink-900/40 rounded-xl">
                <div className="text-ink-500 mb-0.5">Storage</div>
                <div className="font-mono font-semibold">{fmt.bytes(JSON.stringify(store).length)}</div>
              </div>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}

function ListEditor({ title, eyebrow, items, onAdd, onRemove }){
  const [val, setVal] = React.useState("");
  return (
    <Card title={title} eyebrow={eyebrow}>
      <div className="flex gap-2 mb-3">
        <input value={val} onChange={e => setVal(e.target.value)}
               onKeyDown={e => { if (e.key === "Enter" && val.trim()) { onAdd(val.trim()); setVal(""); } }}
               placeholder={`Add ${title.toLowerCase()}…`}
               className="flex-1 px-3 py-2 text-[13px] rounded-xl"/>
        <Button size="sm" onClick={() => { if (val.trim()) { onAdd(val.trim()); setVal(""); } }} disabled={!val.trim()}>
          <Ic.plus width="13" height="13"/>
        </Button>
      </div>
      <div className="flex flex-wrap gap-1.5">
        {(items || []).map(it => (
          <span key={it} className="pill bg-canvas dark:bg-ink-900/40 text-ink-700 dark:text-ink-300 gap-1.5 border border-softline dark:border-ink-800">
            {it}
            <button onClick={() => onRemove(it)} className="hover:text-rose-500 transition"><Ic.x width="11" height="11"/></button>
          </span>
        ))}
        {(!items || items.length === 0) && <div className="text-[12px] text-ink-400">No entries yet.</div>}
      </div>
    </Card>
  );
}

/* =========================================================================
   APP SHELL
   ========================================================================= */
function App(){
  const { store } = useStore();
  // Guard against stale pinnedView from prior versions (e.g. "training" which no longer exists)
  const validNavIds = NAV.map(n => n.id);
  const initialView = validNavIds.includes(store.settings.pinnedView) ? store.settings.pinnedView : "overview";
  const [view, setView] = React.useState(initialView);
  const [query, setQuery] = React.useState("");
  const [collapsed, setCollapsed] = React.useState(false);
  const [firstRun, setFirstRun] = React.useState(() => store.staff.length === 0);

  // Hide the boot splash once the app has actually rendered, not on a blind timer —
  // in-browser Babel compilation can take seconds, and a fixed timeout would reveal a
  // blank screen before React mounts.
  React.useEffect(() => {
    const b = document.getElementById("boot");
    if (b) { b.classList.add("hide"); setTimeout(() => b.remove(), 350); }
  }, []);

  // Reset query on view change
  React.useEffect(() => { setQuery(""); }, [view]);

  const renderView = () => {
    switch (view) {
      case "overview":     return <OverviewView onNav={setView}/>;
      case "staff":        return <StaffView query={query}/>;
      case "capabilities": return <CapabilitiesView/>;
      case "map":          return <MapView/>;
      case "tasks":        return <TasksView query={query}/>;
      case "files":        return <FilesView query={query}/>;
      case "import":       return <ImportView onNav={setView}/>;
      case "reports":      return <ReportsView/>;
      case "settings":     return <SettingsView onNav={setView}/>;
      default:             return <OverviewView onNav={setView}/>;
    }
  };

  return (
    <div className="flex h-full">
      <Sidebar active={view} onNav={setView} collapsed={collapsed} onToggleCollapse={() => setCollapsed(p => !p)}/>
      <div className="flex-1 flex flex-col min-w-0">
        <Header view={view} onNav={setView} query={query} onQuery={setQuery}/>
        <main className="flex-1 min-h-0">{renderView()}</main>
      </div>

      {firstRun && (
        <Modal open onClose={() => setFirstRun(false)} title="Welcome to Staff Console" size="md"
               footer={<>
                 <Button variant="ghost" onClick={() => setFirstRun(false)}>Got it</Button>
                 <Button onClick={() => { setView("import"); setFirstRun(false); }}>
                   <Ic.upload width="14" height="14"/> Import from Excel
                 </Button>
               </>}>
          <div className="space-y-3 text-[13.5px] text-ink-700 dark:text-ink-300">
            <p>Manage your team — staff, capabilities, tasks and files. Everything autosaves to this browser.</p>
            <p>To get started, import a staff spreadsheet, or head to Settings to name the dashboard for your team.</p>
            <p className="text-ink-500 text-[12.5px]">Browser data clears in private mode or if you wipe the cache. Export to Excel weekly as a backup.</p>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* =========================================================================
   MOUNT
   ========================================================================= */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StoreProvider><App/></StoreProvider>);

// Safety net: if React fails to mount within 12s (e.g. a CDN library was blocked),
// drop the splash and show a clear message instead of an indefinite spinner.
setTimeout(() => {
  const b = document.getElementById("boot");
  if (b && !b.classList.contains("hide")) {
    b.innerHTML = '<div style="max-width:420px;text-align:center;font-family:Carlito,sans-serif;color:#6B7180;padding:24px">'
      + '<div style="font-weight:700;font-size:16px;color:#0F1320;margin-bottom:8px">Staff Console couldn’t start</div>'
      + 'A required library failed to load. This usually means the network blocked a CDN. '
      + 'Try again on an unrestricted connection, or use an offline build.</div>';
  }
}, 12000);

</script>
</body>
</html>
