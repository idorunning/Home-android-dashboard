function StaffView({ query }){
  const { store, addStaff, addStaffBulk, updateStaff, removeStaff } = useStore();
  const { staff, tasks, settings } = store;

  const archivedHubs = settings.archivedHubs || [];
  const activeHubs = (settings.hubs || HUBS).filter(h => !archivedHubs.includes(h));

  const [hubFilter, setHubFilter] = React.useState("all");          // Hub — active hubs only
  const [teamFilter, setTeamFilter] = React.useState("");           // Response/Investigations
  const [roleFilter, setRoleFilter] = React.useState("");
  const [statusFilter, setStatusFilter] = React.useState("");
  const [restrictionFilter, setRestrictionFilter] = React.useState("");  // "" | "any" | a type
  const [sortBy, setSortBy] = React.useState({ key: "name", dir: "asc" });
  const [selectedId, setSelectedId] = React.useState(null);
  const [editing, setEditing] = React.useState(null);  // staff object or "new"
  const [quickOpen, setQuickOpen] = React.useState(false);
  const [showResigned, setShowResigned] = React.useState(false);

  useBusListener(Bus.staffAdd,   () => setEditing("new"));
  useBusListener(Bus.staffQuick, () => setQuickOpen(true));

  const resignedCount = staff.filter(s => s.resigned).length;
  const restrictionTypes = settings.restrictionTypes || RESTRICTION_TYPES;
  const statuses = settings.statuses || STATUSES;

  const filtered = React.useMemo(() => {
    let arr = staff.filter(s => {
      if (s.resigned && !showResigned) return false;
      if (hubFilter !== "all" && s.hub !== hubFilter) return false;
      if (teamFilter && s.team !== teamFilter) return false;
      if (roleFilter && s.role !== roleFilter) return false;
      if (statusFilter && s.status !== statusFilter) return false;
      if (restrictionFilter === "any" && !(s.restriction && s.restriction.type)) return false;
      if (restrictionFilter && restrictionFilter !== "any"
          && (!s.restriction || s.restriction.type !== restrictionFilter)) return false;
      if (query) {
        const q = query.toLowerCase();
        return (s.name || "").toLowerCase().includes(q)
            || (s.warrantNumber || "").toLowerCase().includes(q)
            || (s.role || "").toLowerCase().includes(q)
            || (s.team || "").toLowerCase().includes(q)
            || (s.hub || "").toLowerCase().includes(q);
      }
      return true;
    });
    // Column sort — keys map to staff fields, with name falling back to surname
    arr.sort((a, b) => {
      let av, bv;
      if (sortBy.key === "name") { av = (a.lastName || a.name || "").toLowerCase(); bv = (b.lastName || b.name || "").toLowerCase(); }
      else { av = (a[sortBy.key] || "").toString().toLowerCase(); bv = (b[sortBy.key] || "").toString().toLowerCase(); }
      if (av < bv) return sortBy.dir === "asc" ? -1 : 1;
      if (av > bv) return sortBy.dir === "asc" ? 1 : -1;
      return 0;
    });
    return arr;
  }, [staff, hubFilter, teamFilter, roleFilter, statusFilter, restrictionFilter, query, sortBy, showResigned]);

  const selected = staff.find(s => s.id === selectedId);

  const setSort = (key) => setSortBy(p => ({ key, dir: p.key === key && p.dir === "asc" ? "desc" : "asc" }));

  // Compute task completion stats per staff member (for visual indicator)
  const taskStats = React.useMemo(() => {
    const map = {};
    staff.forEach(s => {
      const own = tasks.filter(t => t.assigneeId === s.id);
      const done = own.filter(t => t.completed).length;
      map[s.id] = { total: own.length, done, pct: own.length === 0 ? null : Math.round((done / own.length) * 100) };
    });
    return map;
  }, [staff, tasks]);

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      {/* Area filter chips */}
      <div className="flex items-center gap-2 mb-5 flex-wrap">
        {[
          { id: "all", label: "All", count: staff.filter(s => showResigned || !s.resigned).length },
          ...activeHubs.map(h => ({
            id: h, label: h,
            count: staff.filter(s => s.hub === h && (showResigned || !s.resigned)).length
          }))
        ].map(c => (
          <button key={c.id} onClick={() => setHubFilter(c.id)}
                  className={`px-3.5 py-2 rounded-xl text-[12.5px] font-semibold transition flex items-center gap-2 ${
                    hubFilter === c.id
                      ? "bg-brand-500 text-white shadow-sm"
                      : "bg-card border border-softline text-ink-700 dark:text-ink-300 dark:border-ink-800 hover:border-brand-300"}`}>
            {c.label}
            <span className={`text-[11px] tnum px-1.5 py-0.5 rounded-full ${hubFilter === c.id ? "bg-white/20" : "bg-canvas dark:bg-ink-800"}`}>{c.count}</span>
          </button>
        ))}
        <div className="flex-1"/>
        {resignedCount > 0 && (
          <button onClick={() => setShowResigned(p => !p)}
                  className={`px-3 py-2 rounded-xl text-[12.5px] font-semibold transition flex items-center gap-2 ${
                    showResigned ? "bg-rose-50 text-rose-600 dark:bg-rose-900/20" : "bg-card border border-softline text-ink-600 dark:border-ink-800 hover:border-brand-300"}`}>
            {showResigned ? "Showing resigned / moved" : `Hiding ${resignedCount} resigned / moved`}
          </button>
        )}
        <Select value={teamFilter}   onChange={setTeamFilter}   placeholder="All teams"    options={settings.teams || TEAMS} className="w-40"/>
        <Select value={roleFilter}   onChange={setRoleFilter}   placeholder="All roles"    options={settings.roles || ROLES}    className="w-40"/>
        <Select value={statusFilter} onChange={setStatusFilter} placeholder="All statuses" options={statuses} className="w-36"/>
        <Select value={restrictionFilter} onChange={setRestrictionFilter} placeholder="All restrictions"
                options={[{ value: "any", label: "Any restriction" }, ...restrictionTypes.map(t => ({ value: t, label: t }))]} className="w-44"/>
        {(teamFilter || roleFilter || statusFilter || restrictionFilter) && (
          <Button variant="ghost" size="sm" onClick={() => { setTeamFilter(""); setRoleFilter(""); setStatusFilter(""); setRestrictionFilter(""); }}>
            Reset
          </Button>
        )}
      </div>

      <div className="grid grid-cols-12 gap-6">
        {/* Personnel table */}
        <div className="col-span-12 xl:col-span-8">
          <Card noPad>
            <div className="overflow-x-auto">
              <table className="w-full text-[13px]">
                <thead>
                  <tr className="border-b border-softline dark:border-ink-800 text-ink-500">
                    {[
                      { key: "name",   label: "Name",    cls: "text-left px-5 py-3" },
                      { key: "role",   label: "Role",    cls: "text-left px-3 py-3" },
                      { key: "team",   label: "Team",    cls: "text-left px-3 py-3" },
                      { key: "hub",    label: "Hub",     cls: "text-left px-3 py-3" },
                      { key: "status", label: "Status",  cls: "text-left px-3 py-3" }
                    ].map(col => (
                      <th key={col.key} className={`${col.cls} font-semibold cursor-pointer select-none`} onClick={() => setSort(col.key)}>
                        <span className="inline-flex items-center gap-1">
                          {col.label}
                          {sortBy.key === col.key && <Ic.chev width="11" height="11" className={sortBy.dir === "desc" ? "rotate-180" : ""}/>}
                        </span>
                      </th>
                    ))}
                    <th className="text-left px-3 py-3 font-semibold">Capabilities</th>
                    <th className="px-3 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(s => {
                    const stats = taskStats[s.id] || { total: 0, done: 0, pct: null };
                    const isSel = s.id === selectedId;
                    const caps = s.capabilities || blankCapabilities();
                    const hubArchived = archivedHubs.includes(s.hub);
                    return (
                      <tr key={s.id}
                          onClick={() => setSelectedId(s.id)}
                          onDoubleClick={() => setEditing(s)}
                          className={`tr-row border-b border-softline/60 dark:border-ink-800/40 cursor-pointer ${isSel ? "bg-brand-50/50 dark:bg-brand-900/15" : ""} ${s.resigned ? "opacity-60" : ""}`}
                          title="Click to preview, double-click to edit">
                        <td className="px-5 py-3">
                          <div className="flex items-center gap-3">
                            <Avatar name={s.name} photoId={s.photoId} size={36}/>
                            <div>
                              <div className="font-semibold text-ink-900 dark:text-ink-100 flex items-center gap-1.5">
                                <StaffNameLink staff={s}/>
                                {s.resigned && <Pill tone="rose">Resigned / moved</Pill>}
                                {!s.inLatestImport && <Pill tone="amber">Not in import</Pill>}
                              </div>
                              <div className="text-[11.5px] text-ink-500 font-mono">{s.warrantNumber || "—"}</div>
                            </div>
                          </div>
                        </td>
                        <td className="px-3 py-3">
                          <div className="text-ink-700 dark:text-ink-300 font-medium flex items-center gap-1.5">
                            {s.role}
                            {s.acting && <Pill tone="amber">A/Sgt</Pill>}
                          </div>
                        </td>
                        <td className="px-3 py-3">
                          <span className="text-ink-700 dark:text-ink-300">{s.team || "—"}</span>
                        </td>
                        <td className="px-3 py-3">
                          <div className="flex items-center gap-1.5">
                            <span className="text-ink-700 dark:text-ink-300">{s.hub || "—"}</span>
                            {hubArchived && <Pill tone="neutral">archived</Pill>}
                          </div>
                        </td>
                        <td className="px-3 py-3">
                          <div className="flex flex-col gap-1 items-start">
                            <StatusBadge value={s.status}/>
                            {s.restriction && s.restriction.type && <RestrictionBadge restriction={s.restriction}/>}
                          </div>
                        </td>
                        <td className="px-3 py-3">
                          <div className="flex items-center gap-0.5" title="Blues · Taser · Pursuit · PSU · MOE · Dirfit · EBTI">
                            {CAPABILITIES.map(cap => {
                              const st = caps[cap.key] || "unknown";
                              const dot = st === "yes" ? "bg-emerald-500" : st === "booked" ? "bg-amber2-500" : st === "no" ? "bg-rose-400" : "bg-ink-200 dark:bg-ink-700";
                              return <span key={cap.key} className={`w-2.5 h-2.5 rounded-full ${dot}`} title={`${cap.label}: ${CAP_STATE_META[st].label}`}/>;
                            })}
                          </div>
                        </td>
                        <td className="px-3 py-3 text-right">
                          <IconBtn onClick={(e) => { e.stopPropagation(); setEditing(s); }} title="Edit"><Ic.edit width="15" height="15"/></IconBtn>
                        </td>
                      </tr>
                    );
                  })}
                  {filtered.length === 0 && (
                    <tr><td colSpan={7} className="px-5 py-12 text-center text-ink-500 text-[13px]">No staff match these filters.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </Card>
        </div>

        {/* Detail column */}
        <div className="col-span-12 xl:col-span-4">
          <div className="sticky top-0">
            {selected ? <StaffDetail key={selected.id} staff={selected} onEdit={() => setEditing(selected)} onRemove={() => { if (confirm(`Remove ${selected.name}?`)) { removeStaff(selected.id); setSelectedId(null); } }} onClose={() => setSelectedId(null)} /> : <EmptyDetail/>}
          </div>
        </div>
      </div>

      {/* Modals */}
      {editing && <StaffForm staff={editing === "new" ? null : editing}
                              onSave={(data) => {
                                if (editing === "new") addStaff(data);
                                else updateStaff(editing.id, data);
                                setEditing(null);
                              }}
                              onCancel={() => setEditing(null)}/>}
      {quickOpen && <QuickAddStaff onClose={() => setQuickOpen(false)} onSave={(rows) => { addStaffBulk(rows); setQuickOpen(false); }}/>}
    </div>
  );
}

function EmptyDetail(){
  return (
    <Card title="Staff details">
      <div className="py-12 text-center">
        <div className="w-14 h-14 mx-auto rounded-2xl bg-brand-50 dark:bg-brand-900/30 flex items-center justify-center text-brand-500 mb-3">
          <Ic.staff width="24" height="24"/>
        </div>
        <div className="text-[14px] font-semibold text-ink-700 dark:text-ink-300 mb-1">Pick someone</div>
        <div className="text-[12.5px] text-ink-500">Click any row to see their full profile, tasks, and training records.</div>
      </div>
    </Card>
  );
}

function StaffDetail({ staff, onEdit, onRemove, onClose }){
  const { store, addFileMeta, removeFileMeta } = useStore();
  const tasks = store.tasks.filter(t => t.assigneeId === staff.id);
  const open = tasks.filter(t => !t.completed);
  const done = tasks.filter(t => t.completed);
  const myFiles = store.files.filter(f => f.scope === "officer" && f.scopeId === staff.id);
  const caps = staff.capabilities || blankCapabilities();
  const hubArchived = (store.settings.archivedHubs || []).includes(staff.hub);
  const [fileBusy, setFileBusy] = React.useState(false);

  const dropOfficerFiles = async (fileList) => {
    setFileBusy(true);
    try {
      for (const file of Array.from(fileList)) {
        if (file.size > FILE_CAP_BYTES) { alert(`"${file.name}" too large, skipped.`); continue; }
        const dataUrl = await fileToDataUrl(file);
        const id = uid("fil");
        await idbPut(id, dataUrl);
        addFileMeta({ id, name: file.name, size: file.size, type: file.type, scope: "officer", scopeId: staff.id });
      }
    } finally { setFileBusy(false); }
  };
  const openFile = async (meta) => {
    const dataUrl = await idbGet(meta.id);
    if (dataUrl) downloadDataUrl(dataUrl, meta.name);
  };
  const deleteFile = async (meta) => {
    if (!confirm(`Delete "${meta.name}"?`)) return;
    await idbDelete(meta.id); removeFileMeta(meta.id);
  };

  return (
    <Card eyebrow={`${staff.team} · ${staff.hub}${hubArchived ? " (archived hub)" : ""}`} title={staff.name}
          action={<>
            {staff.email && <IconBtn onClick={() => window.location.href = `mailto:${staff.email}`} title={`Email ${staff.email}`}><Ic.mail width="15" height="15"/></IconBtn>}
            <IconBtn onClick={onEdit} title="Edit"><Ic.edit width="15" height="15"/></IconBtn>
            <IconBtn onClick={onClose} title="Close"><Ic.x width="15" height="15"/></IconBtn>
          </>}>
      <div className="flex items-center gap-4 mb-4 pb-4 border-b border-softline dark:border-ink-800">
        <Avatar name={staff.name} photoId={staff.photoId} size={64}/>
        <div className="flex-1 min-w-0">
          <div className="font-display font-bold text-ink-900 dark:text-ink-100 flex items-center gap-1.5">
            {staff.role}
            {staff.acting && <Pill tone="amber">A/Sgt</Pill>}
          </div>
          <div className="text-[11.5px] text-ink-500 font-mono mt-0.5">Warrant {staff.warrantNumber || "—"}</div>
        </div>
        <StatusBadge value={staff.status}/>
      </div>

      {(staff.resigned || !staff.inLatestImport || (staff.restriction && staff.restriction.type)) && (
        <div className="flex flex-wrap gap-1.5 mb-4">
          {staff.resigned    && <Pill tone="rose">Resigned / moved team</Pill>}
          {staff.restriction && staff.restriction.type && <RestrictionBadge restriction={staff.restriction}/>}
          {!staff.inLatestImport && <Pill tone="amber">Not in latest import</Pill>}
        </div>
      )}

      <div className="grid grid-cols-3 gap-2 mb-4">
        <div className="text-center p-2.5 bg-canvas dark:bg-ink-900/40 rounded-xl">
          <div className="text-[10.5px] text-ink-500 uppercase tracking-wider mb-0.5">Open</div>
          <div className="font-display font-bold text-[18px] tnum">{open.length}</div>
        </div>
        <div className="text-center p-2.5 bg-canvas dark:bg-ink-900/40 rounded-xl">
          <div className="text-[10.5px] text-ink-500 uppercase tracking-wider mb-0.5">Done</div>
          <div className="font-display font-bold text-[18px] tnum text-emerald-600">{done.length}</div>
        </div>
        <div className="text-center p-2.5 bg-canvas dark:bg-ink-900/40 rounded-xl">
          <div className="text-[10.5px] text-ink-500 uppercase tracking-wider mb-0.5">Files</div>
          <div className="font-display font-bold text-[18px] tnum text-violet-500">{myFiles.length}</div>
        </div>
      </div>

      {/* Capabilities */}
      <div className="mb-4">
        <div className="text-[11px] text-ink-500 uppercase tracking-wider mb-1.5">Capabilities</div>
        <div className="grid grid-cols-7 gap-1">
          {CAPABILITIES.map(cap => {
            const st = caps[cap.key] || "unknown";
            const cls = st === "yes" ? "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300"
                      : st === "booked" ? "bg-amber2-100 text-amber2-600 dark:bg-amber2-900/30"
                      : st === "no" ? "bg-rose-100 text-rose-600 dark:bg-rose-900/30"
                      : "bg-canvas dark:bg-ink-900/40 text-ink-400 border border-dashed border-ink-300";
            return (
              <div key={cap.key} className="text-center" title={`${cap.full} — ${CAP_STATE_META[st].label}`}>
                <div className={`rounded-md py-1 text-[9.5px] font-bold ${cls}`}>{CAP_STATE_META[st].chip}</div>
                <div className="text-[8.5px] text-ink-400 mt-0.5">{cap.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="space-y-1.5 text-[13px] mb-4">
        <DetailRow label="Role" value={staff.role || "—"}/>
        <DetailRow label="Team" value={staff.team || "—"}/>
        <DetailRow label="Hub" value={hubArchived ? `${staff.hub} (archived)` : (staff.hub || "—")}/>
        <DetailRow label="Started" value={staff.startedDate ? fmt.date(staff.startedDate) : "—"}/>
        <DetailRow label="End date" value={staff.endDate ? fmt.date(staff.endDate) : "—"}/>
        {staff.restriction && staff.restriction.type && (
          <>
            <DetailRow label="Restriction" value={staff.restriction.type}/>
            <DetailRow label="Restriction ends" value={staff.restriction.endDate ? fmt.date(staff.restriction.endDate) : "Ongoing"}/>
          </>
        )}
        <DetailRow label="Email" value={staff.email
          ? <a href={`mailto:${staff.email}`} className="text-brand-500 hover:underline">{staff.email}</a>
          : "—"}/>
        <DetailRow label="Phone" value={staff.phone || "—"}/>
      </div>

      {staff.note && (
        <div className="mb-4">
          <div className="text-[11px] text-ink-500 uppercase tracking-wider mb-1.5">Note</div>
          <div className="text-[13px] text-ink-700 dark:text-ink-300 bg-canvas dark:bg-ink-900/40 rounded-xl p-3 whitespace-pre-wrap">{staff.note}</div>
        </div>
      )}

      {open.length > 0 && (
        <div className="mb-4">
          <div className="text-[11px] text-ink-500 uppercase tracking-wider mb-1.5">Open tasks ({open.length})</div>
          <div className="space-y-1.5">
            {open.slice(0, 5).map(t => {
              const cls = classifyTask(t);
              return (
                <div key={t.id} className="flex items-center gap-2 p-2 rounded-lg bg-canvas dark:bg-ink-900/40 text-[12.5px]">
                  <div className={`w-1 h-7 rounded ${cls === "overdue" ? "bg-rose-500" : cls === "soon" ? "bg-amber2-500" : "bg-brand-300"}`}/>
                  <div className="flex-1 min-w-0 truncate">{t.title}</div>
                  <span className="text-[11px] text-ink-500">{fmt.date(t.dueDate)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Officer files — drop zone right here */}
      <div className="mb-2">
        <div className="text-[11px] text-ink-500 uppercase tracking-wider mb-1.5">Files ({myFiles.length})</div>
        <DropZone onFiles={dropOfficerFiles} className="rounded-xl">
          {over => (
            <div className={`border border-dashed rounded-xl p-2.5 transition ${over ? "border-brand-400 bg-brand-50/60 dark:bg-brand-900/20" : "border-softline dark:border-ink-800"}`}>
              {myFiles.length > 0 ? (
                <div className="space-y-1 mb-2">
                  {myFiles.map(f => (
                    <div key={f.id} className="flex items-center gap-2 text-[12.5px] p-1.5 rounded-lg hover:bg-canvas dark:hover:bg-ink-900/40">
                      <Ic.file width="13" height="13" className="text-violet-500 shrink-0"/>
                      <span className="truncate flex-1">{f.name}</span>
                      <span className="text-[10.5px] text-ink-400">{fmt.bytes(f.size)}</span>
                      <button onClick={() => openFile(f)} className="text-ink-400 hover:text-brand-500"><Ic.download width="13" height="13"/></button>
                      <button onClick={() => deleteFile(f)} className="text-ink-400 hover:text-rose-500"><Ic.trash width="13" height="13"/></button>
                    </div>
                  ))}
                </div>
              ) : null}
              <div className="text-[11px] text-ink-400 text-center py-1">
                {fileBusy ? "Uploading…" : over ? "Drop to file under this officer" : "Drag files here to attach to this officer"}
              </div>
            </div>
          )}
        </DropZone>
      </div>

      <div className="mt-4 pt-4 border-t border-softline dark:border-ink-800 flex gap-2">
        <Button variant="outline" size="sm" onClick={onEdit} className="flex-1"><Ic.edit width="13" height="13"/> Edit</Button>
        <Button variant="dangerSoft" size="sm" onClick={onRemove}><Ic.trash width="13" height="13"/></Button>
      </div>
    </Card>
  );
}

function DetailRow({ label, value }){
  return (
    <div className="flex items-center justify-between">
      <span className="text-ink-500">{label}</span>
      <span className="text-ink-900 dark:text-ink-100 text-right">{value}</span>

}

/* =========================================================================
   STAFF FORM (full edit)
   ========================================================================= */
function StaffForm({ staff, onSave, onCancel }){
  const { store } = useStore();
  const roles = store.settings.roles || ROLES;
  const teams = store.settings.teams || TEAMS;
  const allHubs = store.settings.hubs || HUBS;
  const archivedHubs = store.settings.archivedHubs || [];
  const restrictionTypes = store.settings.restrictionTypes || RESTRICTION_TYPES;
  const statuses = store.settings.statuses || STATUSES;
  // Hub dropdown shows active hubs, plus this person's current hub even if archived
  const hubOptions = allHubs.filter(h => !archivedHubs.includes(h) || h === (staff && staff.hub));

  const [form, setForm] = React.useState(staff ? {
    firstName: staff.firstName || (staff.name || "").split(" ")[0] || "",
    lastName:  staff.lastName  || (staff.name || "").split(" ").slice(1).join(" ") || "",
    warrantNumber: staff.warrantNumber || staff.collarNumber || "",
    role: roles.includes(staff.role) ? staff.role : (staff.role || roles[0] || "PC"),
    team: teams.includes(staff.team) ? staff.team : teams[0],
    hub: staff.hub || hubOptions[0] || "Worthing",
    acting: !!staff.acting,
    status: staff.status || "Active",
    resigned: !!staff.resigned,
    startedDate: staff.startedDate || "",
    endDate: staff.endDate || "",
    // Restriction: a type ("" = none) plus an end date
    restrictionType: (staff.restriction && staff.restriction.type) || "",
    restrictionEnd: (staff.restriction && staff.restriction.endDate) || "",
    photoId: staff.photoId || null,
    email: staff.email || "",
    phone: staff.phone || "",
    capabilities: { ...blankCapabilities(), ...(staff.capabilities || {}) },
    tags: staff.tags || [],
    note: staff.note || staff.notes || ""
  } : {
    firstName: "", lastName: "", warrantNumber: "",
    role: roles[0] || "PC", team: teams[0], hub: hubOptions[0] || "Worthing", acting: false,
    status: "Active", resigned: false, startedDate: "", endDate: "",
    restrictionType: "", restrictionEnd: "",
    photoId: null,
    email: "",
    phone: "", capabilities: blankCapabilities(), tags: [], note: ""
  });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const setCap = (k, v) => setForm(p => ({ ...p, capabilities: { ...p.capabilities, [k]: v } }));
  const valid = (form.firstName.trim() + form.lastName.trim()).length > 0;

  // Photo upload — reads the file, stashes it in IndexedDB under a generated id, and
  // saves the id on the staff record. The blob never goes near localStorage.
  const photoInputRef = React.useRef(null);
  const handlePhotoUpload = async (file) => {
    if (!file) return;
    if (!/^image\//.test(file.type)) { alert("Choose an image file (JPG, PNG, etc)."); return; }
    if (file.size > 2 * 1024 * 1024) { alert("Photo is over 2 MB. Please pick a smaller one."); return; }
    try {
      const dataUrl = await fileToDataUrl(file);
      const newId = uid("pho");
      await idbPut(newId, dataUrl);
      // Best-effort cleanup of the previous photo blob
      if (form.photoId) { try { await idbDelete(form.photoId); } catch(e){} }
      set("photoId", newId);
    } catch(e){ alert("Couldn't read that image: " + e.message); }
  };
  const clearPhoto = async () => {
    if (form.photoId) { try { await idbDelete(form.photoId); } catch(e){} }
    set("photoId", null);
  };

  const submit = () => {
    if (!valid) return;
    const name = (form.firstName.trim() + " " + form.lastName.trim()).trim();
    // Build the restriction object — null if no type chosen
    const restriction = form.restrictionType
      ? { type: form.restrictionType, endDate: form.restrictionEnd ? new Date(form.restrictionEnd).toISOString() : null }
      : null;
    // Strip the flat form-helper fields so they don't pollute the staff record
    const { restrictionType, restrictionEnd, ...rest } = form;
    onSave({
      ...rest,
      name,
      restriction,
      startedDate: form.startedDate ? new Date(form.startedDate).toISOString() : null,
      endDate: form.endDate ? new Date(form.endDate).toISOString() : null
    });
  };

  return (
    <Modal open onClose={onCancel} title={staff ? "Edit staff member" : "New staff member"} size="lg"
           footer={<>
             <Button variant="ghost" onClick={onCancel}>Cancel</Button>
             <Button onClick={submit} disabled={!valid}><Ic.check width="14" height="14"/> {staff ? "Save changes" : "Add staff"}</Button>
           </>}>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {/* Photo — optional. Stored as a blob in IndexedDB, keyed off the staff record. */}
        <div className="sm:col-span-2">
          <Field label="Photo (optional)">
            <div className="flex items-center gap-4">
              <Avatar name={(form.firstName + " " + form.lastName).trim() || "?"} size={64} photoId={form.photoId}/>
              <div className="flex flex-col gap-1.5">
                <input ref={photoInputRef} type="file" accept="image/*" onChange={e => handlePhotoUpload(e.target.files[0])} className="hidden"/>
                <div className="flex gap-2">
                  <Button size="sm" variant="outline" onClick={() => photoInputRef.current?.click()}>
                    <Ic.upload width="13" height="13"/> {form.photoId ? "Replace photo" : "Upload photo"}
                  </Button>
                  {form.photoId && (
                    <Button size="sm" variant="ghost" onClick={clearPhoto}>Remove</Button>
                  )}
                </div>
                <div className="text-[11px] text-ink-500">JPG or PNG, under 2 MB. Stored locally — no upload to any server.</div>
              </div>
            </div>
          </Field>
        </div>

        <Field label="First name" required>
          <Input value={form.firstName} onChange={v => set("firstName", v)} placeholder="Jane"/>
        </Field>
        <Field label="Last name">
          <Input value={form.lastName} onChange={v => set("lastName", v)} placeholder="Doe"/>
        </Field>
        <Field label="Warrant number">
          <Input value={form.warrantNumber} onChange={v => set("warrantNumber", v)} placeholder="e.g. EB142 or 44309"/>
        </Field>
        <Field label="Phone">
          <Input value={form.phone} onChange={v => set("phone", v)} placeholder="07700 900..."/>
        </Field>
        <div className="sm:col-span-2">
          <Field label="Email">
            <div className="flex gap-2 items-start">
              <div className="flex-1">
                <Input value={form.email} onChange={v => set("email", v)} placeholder="firstname.lastname@sussex.police.uk"/>
              </div>
              <Button variant="outline" size="sm" onClick={() => {
                // Regenerate from current first/last name — used when names change or to reset oddities
                const clean = s => (s || "").toString().trim().toLowerCase().replace(/[^a-z0-9\-]/g, "");
                const fn = clean(form.firstName);
                const ln = clean(form.lastName);
                if (fn && ln) set("email", `${fn}.${ln}@sussex.police.uk`);
              }}>From name</Button>
            </div>
            <div className="text-[11px] text-ink-500 mt-1">Auto-generated as firstname.lastname@sussex.police.uk — amend for hyphenated names, transfers, or any oddities.</div>
          </Field>
        </div>
        <Field label="Role">
          <Select value={form.role} onChange={v => set("role", v)} options={roles}/>
        </Field>
        <Field label="Team">
          <Select value={form.team} onChange={v => set("team", v)} options={teams}/>
        </Field>
        <Field label="Hub">
          <Select value={form.hub} onChange={v => set("hub", v)} options={hubOptions}/>
          {archivedHubs.includes(form.hub) && <div className="text-[11px] text-amber2-600 mt-1">This hub is archived.</div>}
        </Field>
        <Field label="Status">
          <Select value={form.status} onChange={v => set("status", v)} options={statuses}/>
        </Field>
        <Field label="Started date (optional)">
          <Input type="date" value={fmt.dateInput(form.startedDate)} onChange={v => set("startedDate", v)}/>
        </Field>
        <Field label="End date (optional)">
          <Input type="date" value={fmt.dateInput(form.endDate)} onChange={v => set("endDate", v)}/>
          <div className="text-[11px] text-ink-500 mt-1">Drives the staffing projection — when someone is due to leave.</div>
        </Field>

        {/* Flags */}
        <div className="sm:col-span-2">
          <Field label="Flags">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
              <label className={`flex items-center gap-2 px-3 py-2 rounded-xl border-2 cursor-pointer transition ${form.acting ? "border-amber2-400 bg-amber2-50 dark:bg-amber2-900/20" : "border-softline hover:border-amber2-300"}`}>
                <input type="checkbox" checked={form.acting} onChange={e => set("acting", e.target.checked)} className="w-4 h-4 accent-amber-500"/>
                <span className="text-[13px] font-semibold">Acting Sergeant</span>
              </label>
              <label className={`flex items-center gap-2 px-3 py-2 rounded-xl border-2 cursor-pointer transition ${form.resigned ? "border-rose-400 bg-rose-50 dark:bg-rose-900/20" : "border-softline hover:border-rose-300"}`}>
                <input type="checkbox" checked={form.resigned} onChange={e => set("resigned", e.target.checked)} className="w-4 h-4 accent-rose-500"/>
                <span className="text-[13px] font-semibold">Resigned or moved team</span>
              </label>
            </div>
            <div className="text-[11px] text-ink-500 mt-1.5">Untick "resigned or moved" if they come back to your team.</div>
          </Field>
        </div>

        {/* Restriction — secondment, long-term sick, attachment, restricted/suspended */}
        <div className="sm:col-span-2">
          <Field label="Restriction / absence">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
              <Select value={form.restrictionType} onChange={v => set("restrictionType", v)}
                      options={["", ...restrictionTypes]} placeholder="None"/>
              <Input type="date" value={fmt.dateInput(form.restrictionEnd)} onChange={v => set("restrictionEnd", v)}
                     disabled={!form.restrictionType}/>
            </div>
            <div className="text-[11px] text-ink-500 mt-1.5">
              {form.restrictionType
                ? "On a restriction — kept in the list but not counted toward active strength until the end date."
                : "Leave as None unless they're seconded, on long-term sick, on attachment, or restricted/suspended."}
            </div>
          </Field>
        </div>

        {/* Capabilities editor */}
        <div className="sm:col-span-2">
          <Field label="Capabilities">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
              {CAPABILITIES.map(cap => (
                <div key={cap.key} className="flex items-center gap-2">
                  <span className="text-[12px] text-ink-600 dark:text-ink-400 w-20 shrink-0" title={cap.full}>{cap.label}</span>
                  <div className="inline-flex rounded-lg border border-softline dark:border-ink-800 overflow-hidden">
                    {CAP_STATES.map(st => (
                      <button key={st} type="button" onClick={() => setCap(cap.key, st)}
                              className={`px-2 py-1 text-[10.5px] font-bold transition ${form.capabilities[cap.key] === st
                                ? (st === "yes" ? "bg-emerald-500 text-white" : st === "booked" ? "bg-amber2-500 text-white" : st === "no" ? "bg-rose-500 text-white" : "bg-ink-400 text-white")
                                : "bg-card text-ink-500 hover:bg-canvas"}`}>
                        {CAP_STATE_META[st].chip}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </Field>
        </div>

        <div className="sm:col-span-2">
          <Field label="Skills">
            <TagInput value={form.tags} onChange={v => set("tags", v)} suggestions={store.settings.tags}/>
          </Field>
        </div>
        <div className="sm:col-span-2">
          <Field label="Note">
            <Textarea value={form.note} onChange={v => set("note", v)} rows={3} placeholder="e.g. Leaving Feb, acting Sgt, due to join Investigations…"/>
          </Field>
        </div>
      </div>
    </Modal>
  );
}

function Field({ label, required, children }){
  return (
    <div>
      <label className="block text-[11.5px] font-semibold text-ink-700 dark:text-ink-300 mb-1.5">
        {label}{required && <span className="text-rose-500 ml-0.5">*</span>}
      </label>
      {children}
    </div>
  );
}

/* =========================================================================
   QUICK ADD STAFF (bulk)
   ========================================================================= */
function QuickAddStaff({ onClose, onSave }){
  const { store } = useStore();
  const roles = store.settings.roles || ROLES;
  const teams = store.settings.teams || TEAMS;
  const archivedHubs = store.settings.archivedHubs || [];
  const hubOptions = (store.settings.hubs || HUBS).filter(h => !archivedHubs.includes(h));

  const blank = () => ({
    firstName: "", lastName: "", warrantNumber: "",
    role: roles[0] || "PC", team: teams[0], hub: hubOptions[0] || "Worthing",
    acting: false, resigned: false
  });
  const [rows, setRows] = React.useState(() => Array.from({ length: 8 }, blank));

  const update = (i, k, v) => setRows(p => p.map((r, idx) => idx === i ? { ...r, [k]: v } : r));
  const remove = (i) => setRows(p => p.filter((_, idx) => idx !== i));
  const addRow = () => setRows(p => [...p, blank()]);
  const addManyRows = (n) => setRows(p => [...p, ...Array.from({ length: n }, blank)]);

  // Paste from spreadsheet: tab or comma separated.
  // Column order: First | Last | Warrant | Role | Team | Hub | Acting | Resigned
  const handlePaste = (startIdx, e) => {
    const text = e.clipboardData.getData("text");
    if (!text.includes("\t") && !text.includes(",") && !text.includes("\n")) return;
    e.preventDefault();
    const lines = text.trim().split(/\r?\n/).map(l => l.split(/\t|,/).map(c => c.trim()));
    setRows(p => {
      const next = [...p];
      lines.forEach((cols, li) => {
        const idx = startIdx + li;
        while (idx >= next.length) next.push(blank());
        const [first, last, warrant, role, team, hub, acting, resigned] = cols;
        const truthy = s => /^(y|yes|true|1|✓|x)$/i.test((s || "").trim());
        const roleNorm = ROLE_NORMALISE[(role || "").trim().toLowerCase()];
        next[idx] = {
          ...next[idx],
          firstName:     first    || next[idx].firstName,
          lastName:      last     || next[idx].lastName,
          warrantNumber: warrant  || next[idx].warrantNumber,
          role:          roleNorm || next[idx].role,
          team:          teams.includes(team) ? team : next[idx].team,
          hub:           hubOptions.includes(hub) ? hub : next[idx].hub,
          acting:        acting   != null ? truthy(acting)   : next[idx].acting,
          resigned:      resigned != null ? truthy(resigned) : next[idx].resigned
        };
      });
      return next;
    });
  };

  const validRows = rows.filter(r => r.firstName.trim() || r.lastName.trim());

  const save = () => {
    const payload = validRows.map(r => ({
      firstName:     r.firstName.trim(),
      lastName:      r.lastName.trim(),
      name:          (r.firstName.trim() + " " + r.lastName.trim()).trim(),
      warrantNumber: r.warrantNumber.trim(),
      role:          r.role,
      team:          r.team,
      hub:           r.hub,
      acting:        r.acting,
      status:        "Active",
      resigned:      r.resigned,
      startedDate:   null,
      endDate:       null,
      capabilities:  blankCapabilities(),
      note:          ""
    }));
    onSave(payload);
  };

  const cell = "py-1.5 pr-1.5";

  return (
    <Modal open onClose={onClose} title="Quick add staff" size="xl"
           footer={<>
             <div className="flex-1 text-[12.5px] text-ink-500">
               {validRows.length} of {rows.length} rows ready.
             </div>
             <Button variant="ghost" onClick={onClose}>Cancel</Button>
             <Button onClick={save} disabled={validRows.length === 0}>
               <Ic.check width="14" height="14"/> Add {validRows.length || ""} {validRows.length === 1 ? "person" : "people"}
             </Button>
           </>}>
      <div className="text-[12px] text-ink-500 mb-3 p-2.5 bg-canvas dark:bg-ink-900/40 rounded-lg">
        Type or paste a block from Excel. Column order: First name · Last name · Warrant · Role · Team · Hub · Acting · Resigned.
        Boolean columns accept y/yes/true/1.
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-[13px]" style={{ minWidth: "1000px" }}>
          <thead>
            <tr className="text-ink-500 text-[10.5px] uppercase tracking-wider">
              <th className="text-left pb-2 pl-1 font-semibold w-8">#</th>
              <th className="text-left pb-2 pr-1.5 font-semibold">First name *</th>
              <th className="text-left pb-2 pr-1.5 font-semibold">Last name</th>
              <th className="text-left pb-2 pr-1.5 font-semibold">Warrant</th>
              <th className="text-left pb-2 pr-1.5 font-semibold">Role</th>
              <th className="text-left pb-2 pr-1.5 font-semibold">Team</th>
              <th className="text-left pb-2 pr-1.5 font-semibold">Hub</th>
              <th className="text-center pb-2 pr-1.5 font-semibold w-12">Acting</th>
              <th className="text-center pb-2 pr-1.5 font-semibold w-14">Resigned</th>
              <th className="pb-2 w-8"></th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} className="border-t border-softline/60 dark:border-ink-800/40">
                <td className="py-1.5 pl-1 text-ink-400 tnum">{i+1}</td>
                <td className={cell}><input value={r.firstName} onChange={e => update(i, "firstName", e.target.value)} onPaste={e => handlePaste(i, e)} placeholder="Jane" className="w-full px-2.5 py-1.5 rounded-lg text-[13px]"/></td>
                <td className={cell}><input value={r.lastName}  onChange={e => update(i, "lastName",  e.target.value)} placeholder="Doe"  className="w-full px-2.5 py-1.5 rounded-lg text-[13px]"/></td>
                <td className={cell}><input value={r.warrantNumber} onChange={e => update(i, "warrantNumber", e.target.value)} placeholder="EB142" className="w-24 px-2.5 py-1.5 rounded-lg text-[13px] font-mono"/></td>
                <td className={cell}>
                  <select value={r.role} onChange={e => update(i, "role", e.target.value)} className="w-full px-2 py-1.5 rounded-lg text-[13px]">
                    {roles.map(rr => <option key={rr} value={rr}>{rr}</option>)}
                  </select>
                </td>
                <td className={cell}>
                  <select value={r.team} onChange={e => update(i, "team", e.target.value)} className="w-full px-2 py-1.5 rounded-lg text-[13px]">
                    {teams.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </td>
                <td className={cell}>
                  <select value={r.hub} onChange={e => update(i, "hub", e.target.value)} className="w-full px-2 py-1.5 rounded-lg text-[13px]">
                    {hubOptions.map(h => <option key={h} value={h}>{h}</option>)}
                  </select>
                </td>
                <td className={`${cell} text-center`}>
                  <input type="checkbox" checked={r.acting}   onChange={e => update(i, "acting",   e.target.checked)} className="w-4 h-4 accent-amber-500 cursor-pointer" title="Acting Sergeant"/>
                </td>
                <td className={`${cell} text-center`}>
                  <input type="checkbox" checked={r.resigned} onChange={e => update(i, "resigned", e.target.checked)} className="w-4 h-4 accent-rose-500 cursor-pointer" title="Resigned or moved team"/>
                </td>
                <td className="py-1.5">
                  <button onClick={() => remove(i)} className="w-7 h-7 rounded-lg hover:bg-rose-50 dark:hover:bg-rose-900/20 text-ink-400 hover:text-rose-500 flex items-center justify-center"><Ic.x width="14" height="14"/></button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="mt-3 flex items-center gap-3 text-[12.5px]">
          <button onClick={() => addRow()} className="inline-flex items-center gap-1.5 font-semibold text-brand-500 hover:underline">
            <Ic.plus width="13" height="13"/> Add row
          </button>
          <button onClick={() => addManyRows(5)} className="inline-flex items-center gap-1.5 font-semibold text-brand-500 hover:underline">
            <Ic.plus width="13" height="13"/> Add 5 rows
          </button>
        </div>
      </div>
    </Modal>
  );
}

/* =========================================================================
   MAP VIEW (Leaflet — Worthing & Horsham)
   ========================================================================= */
function MapView(){
  const { store } = useStore();
  const { staff, settings } = store;
  const mapEl = React.useRef(null);
  const mapObj = React.useRef(null);
  const layerRef = React.useRef(null);

  // Hub centres across the division
  const HUB_CENTRES = {
    Worthing:      { lat: 50.8179, lng: -0.3729, color: "#5765E0" },
    Horsham:       { lat: 51.0629, lng: -0.3266, color: "#9B7CF0" },
    Chichester:    { lat: 50.8366, lng: -0.7792, color: "#3A86F0" },
    Bognor:        { lat: 50.7829, lng: -0.6730, color: "#0EAB94" },
    Littlehampton: { lat: 50.8118, lng: -0.5413, color: "#E89A1C" }
  };
  const archivedHubs = settings.archivedHubs || [];
  // Only plot active hubs that we have coordinates for
  const activeHubs = (settings.hubs || HUBS).filter(h => !archivedHubs.includes(h) && HUB_CENTRES[h]);

  // Staff grouped by hub (active hubs only)
  const byHub = React.useMemo(() => {
    const c = {};
    activeHubs.forEach(h => { c[h] = []; });
    staff.forEach(s => { if (c[s.hub]) c[s.hub].push(s); });
    return c;
  }, [staff, settings.hubs, settings.archivedHubs]);

  const [focus, setFocus] = React.useState("all"); // "all" | hub name

  React.useEffect(() => {
    if (!mapEl.current || mapObj.current) return;
    const m = L.map(mapEl.current, { zoomControl: true, attributionControl: true, scrollWheelZoom: false })
      .setView([50.86, -0.5], 10);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18
    }).addTo(m);
    mapObj.current = m;
  }, []);

  // Refresh markers when data changes
  React.useEffect(() => {
    if (!mapObj.current) return;
    if (layerRef.current) layerRef.current.clearLayers();
    else layerRef.current = L.layerGroup().addTo(mapObj.current);
    const g = layerRef.current;

    activeHubs.forEach(hub => {
      const c = HUB_CENTRES[hub];
      const list = byHub[hub] || [];
      L.circle([c.lat, c.lng], {
        radius: 1400 + list.length * 110,
        color: c.color, weight: 2, fillColor: c.color, fillOpacity: 0.10
      }).addTo(g);

      const html = `
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div style="background:${c.color};color:white;border-radius:14px;padding:8px 14px;font-family:'Carlito',sans-serif;font-weight:800;font-size:18px;box-shadow:0 4px 14px rgba(15,19,32,.20);">
            ${list.length}
          </div>
          <div style="margin-top:4px;background:#fff;border-radius:8px;padding:2px 8px;font-family:'Carlito',sans-serif;font-weight:600;font-size:11px;color:#0F1320;box-shadow:0 2px 6px rgba(15,19,32,.10);">
            ${hub}
          </div>
        </div>`;
      L.marker([c.lat, c.lng], { icon: L.divIcon({ html, className: "", iconSize: [60, 60], iconAnchor: [30, 30] }) }).addTo(g);

      list.forEach(s => {
        if (!s.lat || !s.lng) return;
        const dot = L.circleMarker([s.lat, s.lng], {
          radius: 6, color: "white", weight: 2, fillColor: c.color, fillOpacity: 0.95
        }).addTo(g);
        const pop = `<div style="font-family:'Carlito',sans-serif;font-size:12.5px;min-width:160px;">
                       <div style="font-weight:700;color:#0F1320;">${s.name}</div>
                       <div style="color:#6B7180;font-size:11.5px;margin-top:2px;">${s.role}${s.warrantNumber ? " · " + s.warrantNumber : ""}</div>
                       <div style="color:#5765E0;font-size:11.5px;margin-top:4px;">${s.team || ""}${s.acting ? " · Acting Sgt" : ""}</div>
                     </div>`;
        dot.bindPopup(pop);
      });
    });

    if (focus !== "all" && HUB_CENTRES[focus]) {
      mapObj.current.flyTo([HUB_CENTRES[focus].lat, HUB_CENTRES[focus].lng], 12);
    } else {
      mapObj.current.flyTo([50.86, -0.5], 10);
    }
  }, [byHub, focus]);

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      <div className="grid grid-cols-12 gap-6">
        <div className="col-span-12 lg:col-span-8">
          <Card title="Division hubs"
                action={<>
                  <button onClick={() => setFocus("all")} className={`px-3 py-1.5 rounded-lg text-[12px] font-semibold transition ${focus === "all" ? "bg-brand-500 text-white" : "text-ink-600 hover:bg-canvas"}`}>All</button>
                  {activeHubs.map(h => (
                    <button key={h} onClick={() => setFocus(h)} className={`px-3 py-1.5 rounded-lg text-[12px] font-semibold transition ${focus === h ? "bg-brand-500 text-white" : "text-ink-600 hover:bg-canvas"}`}>{h}</button>
                  ))}
                </>}>
            <div ref={mapEl} style={{ height: "560px", borderRadius: "14px", overflow: "hidden" }}/>
          </Card>
        </div>

        <div className="col-span-12 lg:col-span-4 space-y-6">
          <Card>
            <div className="grid grid-cols-2 gap-3">
              {activeHubs.map(hub => {
                const c = HUB_CENTRES[hub];
                return (
                  <button key={hub} onClick={() => setFocus(hub)} className="text-left p-4 rounded-xl bg-canvas dark:bg-ink-900/40 hover:bg-card transition">
                    <div className="text-[11px] text-ink-500 uppercase tracking-wider mb-1">{hub}</div>
                    <div className="font-display font-extrabold text-[28px] tnum leading-none" style={{ color: c.color }}>{(byHub[hub] || []).length}</div>
                    <div className="text-[11.5px] text-ink-500 mt-1.5">on strength</div>
                  </button>
                );
              })}
            </div>
          </Card>

          {activeHubs.map(hub => {
            const list = byHub[hub] || [];
            const active = list.filter(s => s.status === "Active").length;
            return (
              <Card key={hub} title={hub} eyebrow={`${list.length} staff`}>
                <div className="space-y-1">
                  {list.length === 0 && <div className="text-[12.5px] text-ink-500 py-2">No staff assigned.</div>}
                  {list.slice(0, 8).map(s => (
                    <div key={s.id} className="flex items-center gap-2.5 p-1.5 rounded-lg hover:bg-canvas dark:hover:bg-ink-900/40 transition">
                      <Avatar name={s.name} photoId={s.photoId} size={28}/>
                      <div className="flex-1 min-w-0">
                        <div className="text-[12.5px] font-medium truncate"><StaffNameLink staff={s}/></div>
                        <div className="text-[11px] text-ink-500 truncate">{s.role} · {s.team || "—"}</div>
                      </div>
                      <StatusBadge value={s.status}/>
                    </div>
                  ))}
                  {list.length > 8 && <div className="text-[11.5px] text-ink-500 pt-1 pl-1">+{list.length - 8} more</div>}
                </div>
                <div className="mt-3 pt-3 border-t border-softline dark:border-ink-800 flex items-center justify-between text-[11.5px]">
                  <span className="text-ink-500">Active right now</span>
                  <span className="font-semibold text-emerald-600 tnum">{active}/{list.length}</span>
                </div>
              </Card>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   TASKS VIEW
   ========================================================================= */
function TasksView({ query }){
  const { store, addTask, updateTask, removeTask, completeTask, reopenTask } = useStore();
  const { tasks, staff, settings } = store;

  const [tab, setTab] = React.useState("open");
  const [assigneeFilter, setAssigneeFilter] = React.useState("");
  const [categoryFilter, setCategoryFilter] = React.useState("");
  const [typeFilter, setTypeFilter] = React.useState("all");   // all | tasks | chasers
  const [editing, setEditing] = React.useState(null);          // task object or "new"
  const [editingChaser, setEditingChaser] = React.useState(null);  // chaser object or "new"

  useBusListener(Bus.taskAdd, () => setEditing("new"));
  useBusListener(Bus.chaserAdd, () => setEditingChaser("new"));

  const classified = React.useMemo(() => {
    return tasks.map(t => ({ ...t, _cls: classifyTask(t) }));
  }, [tasks]);

  const counts = {
    open:      classified.filter(t => t._cls === "open" || t._cls === "soon" || t._cls === "overdue").length,
    soon:      classified.filter(t => t._cls === "soon").length,
    overdue:   classified.filter(t => t._cls === "overdue").length,
    done:      classified.filter(t => t._cls === "done").length,
    chasers:   classified.filter(t => t.isChaser && t._cls !== "done").length
  };

  // Does this task involve a given staff id? (handles both shapes)
  const involves = (t, sid) => t.isChaser ? (t.assigneeIds || []).includes(sid) : t.assigneeId === sid;

  const filtered = React.useMemo(() => {
    return classified
      .filter(t => {
        if (tab === "open"    && !(t._cls === "open" || t._cls === "soon" || t._cls === "overdue")) return false;
        if (tab === "soon"    && t._cls !== "soon") return false;
        if (tab === "overdue" && t._cls !== "overdue") return false;
        if (tab === "done"    && t._cls !== "done") return false;
        if (typeFilter === "tasks"   && t.isChaser) return false;
        if (typeFilter === "chasers" && !t.isChaser) return false;
        if (assigneeFilter && !involves(t, assigneeFilter)) return false;
        if (categoryFilter && t.category !== categoryFilter) return false;
        if (query) {
          const q = query.toLowerCase();
          if (!(t.title || "").toLowerCase().includes(q) && !(t.description || "").toLowerCase().includes(q)) return false;
        }
        return true;
      })
      .sort((a, b) => {
        if (tab === "done") return new Date(b.completedAt || 0) - new Date(a.completedAt || 0);
        return new Date(a.dueDate || 0) - new Date(b.dueDate || 0);
      });
  }, [classified, tab, assigneeFilter, categoryFilter, typeFilter, query]);

  return (
    <div className="px-8 py-6 overflow-y-auto h-full app-bg">
      <div className="flex items-center gap-2 mb-5 flex-wrap">
        {[
          { id: "open",    label: "Open",      count: counts.open },
          { id: "soon",    label: "Due soon",  count: counts.soon },
          { id: "overdue", label: "Overdue",   count: counts.overdue },
          { id: "done",    label: "Completed", count: counts.done }
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
                  className={`px-4 py-2 rounded-xl text-[13px] font-semibold transition flex items-center gap-2 ${
                    tab === t.id ? "bg-brand-500 text-white shadow-sm" : "bg-card border border-softline text-ink-700 dark:text-ink-300 dark:border-ink-800 hover:border-brand-300"}`}>
            {t.label}
            <span className={`text-[11px] tnum px-1.5 py-0.5 rounded-full ${tab === t.id ? "bg-white/20" : "bg-canvas dark:bg-ink-800"}`}>{t.count}</span>
          </button>
        ))}
        <div className="w-px h-6 bg-softline dark:bg-ink-800 mx-1"/>
        {[["all","All"],["tasks","Tasks"],["chasers","Chasers"]].map(([id,label]) => (
          <button key={id} onClick={() => setTypeFilter(id)}
                  className={`px-3 py-2 rounded-xl text-[12.5px] font-semibold transition ${typeFilter === id ? "bg-violet-500 text-white" : "bg-card border border-softline text-ink-600 dark:border-ink-800 hover:border-violet-300"}`}>
            {label}{id === "chasers" && counts.chasers > 0 ? ` (${counts.chasers})` : ""}
          </button>
        ))}
        <div className="flex-1"/>
        <Select value={assigneeFilter} onChange={setAssigneeFilter} placeholder="All staff"
                options={staff.map(s => ({ value: s.id, label: s.name }))} className="w-44"/>
        <Select value={categoryFilter} onChange={setCategoryFilter} placeholder="All categories" options={settings.categories} className="w-40"/>
      </div>

      <Card noPad>
        {filtered.length === 0 ? (
          <div className="py-16 text-center">
            <div className="w-14 h-14 mx-auto rounded-2xl bg-emerald-50 dark:bg-emerald-900/20 flex items-center justify-center text-emerald-500 mb-3">
              <Ic.check width="24" height="24"/>
            </div>
            <div className="text-[14px] font-semibold text-ink-700 dark:text-ink-300 mb-1">Nothing here</div>
            <div className="text-[12.5px] text-ink-500">No tasks or chasers match this view right now.</div>
          </div>
        ) : (
          <div className="divide-y divide-softline dark:divide-ink-800/60">
            {filtered.map(t => {
              const recurring = t.recurrence && t.recurrence.type && t.recurrence.type !== "none";
              // Resolve assignees — chasers have many, tasks have one
              const chaserStaff = t.isChaser ? (t.assigneeIds || []).map(id => staff.find(s => s.id === id)).filter(Boolean) : [];
              const a = !t.isChaser ? staff.find(s => s.id === t.assigneeId) : null;
              return (
                <div key={t.id} className={`flex items-start gap-4 px-5 py-4 hover:bg-canvas/60 dark:hover:bg-ink-900/30 transition ${t.completed ? "task-done" : ""} ${t.isChaser ? "border-l-2 border-l-violet-400" : ""}`}>
                  <button onClick={() => t.completed ? reopenTask(t.id) : completeTask(t.id)}
                          className={`mt-0.5 w-6 h-6 rounded-md border-2 flex items-center justify-center transition shrink-0 ${
                            t.completed
                              ? "bg-emerald-500 border-emerald-500 text-white"
                              : "border-ink-300 hover:border-brand-500 dark:border-ink-700"}`}
                          title={t.completed ? "Reopen" : "Mark done"}>
                    {t.completed && <span className="anim-check"><Ic.check width="13" height="13" strokeWidth="3"/></span>}
                  </button>

                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      {t.isChaser && <Pill tone="violet">Chaser</Pill>}
                      <span className="task-title font-semibold text-[14px] text-ink-900 dark:text-ink-100">{t.title}</span>
                      <PriorityBadge value={t.priority}/>
                      {recurring && <Pill tone="violet">↻ {t.recurrence.type}</Pill>}
                      {t.category && <Pill tone="neutral">{t.category}</Pill>}
                    </div>
                    {t.description && <div className="text-[12.5px] text-ink-500 mt-1 line-clamp-2">{t.description}</div>}
                    <div className="flex items-center gap-3 mt-2 text-[12px] text-ink-500 flex-wrap">
                      {/* Chaser: show the staff chips */}
                      {t.isChaser && chaserStaff.length > 0 && (
                        <span className="inline-flex items-center gap-1.5 flex-wrap">
                          {chaserStaff.slice(0, 5).map(s => (
                            <span key={s.id} className="inline-flex items-center gap-1 bg-canvas dark:bg-ink-800 rounded-full pl-0.5 pr-2 py-0.5">
                              <Avatar name={s.name} photoId={s.photoId} size={16}/>
                              <span className="font-medium text-ink-700 dark:text-ink-300 text-[11px]">{s.name}</span>
                            </span>
                          ))}
                          {chaserStaff.length > 5 && <span className="text-[11px]">+{chaserStaff.length - 5} more</span>}
                        </span>
                      )}
                      {t.isChaser && chaserStaff.length === 0 && <span className="text-ink-400">No staff selected</span>}
                      {/* Regular task: single assignee */}
                      {a && (
                        <span className="inline-flex items-center gap-1.5">
                          <Avatar name={a.name} photoId={a.photoId} size={18}/>
                          <span className="font-medium text-ink-700 dark:text-ink-300">{a.name}</span>
                        </span>
                      )}
                      {t.dueDate && (
                        <span className={`inline-flex items-center gap-1 ${t._cls === "overdue" ? "text-rose-500 font-semibold" : t._cls === "soon" ? "text-amber2-600 font-semibold" : ""}`}>
                          <Ic.cal width="12" height="12"/>
                          {t.isChaser ? "Chase by " : ""}{fmt.date(t.dueDate)}
                          {t._cls === "overdue" && " · overdue"}
                          {t._cls === "soon" && " · due soon"}
                        </span>
                      )}
                      {t.completedAt && <span className="text-emerald-600">Done {fmt.date(t.completedAt)}</span>}
                    </div>
                  </div>

                  <div className="flex items-center gap-1 shrink-0">
                    <IconBtn onClick={() => t.isChaser ? setEditingChaser(t) : setEditing(t)} title="Edit"><Ic.edit width="14" height="14"/></IconBtn>
                    <IconBtn onClick={() => { if (confirm(`Delete this ${t.isChaser ? "chaser" : "task"}?`)) removeTask(t.id); }} title="Delete"><Ic.trash width="14" height="14"/></IconBtn>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Card>

      {editing && <TaskForm task={editing === "new" ? null : editing}
                            onSave={(data) => {
                              if (editing === "new") addTask(data);
                              else updateTask(editing.id, data);
                              setEditing(null);
                            }}
                            onCancel={() => setEditing(null)}/>}

      {editingChaser && <ChaserForm chaser={editingChaser === "new" ? null : editingChaser}
                            onSave={(data) => {
                              if (editingChaser === "new") addTask(data);
                              else updateTask(editingChaser.id, data);
                              setEditingChaser(null);
                            }}
                            onCancel={() => setEditingChaser(null)}/>}
    </div>
  );
}

/* Multi-select staff picker — used by the chaser form */
function MultiStaffPicker({ value = [], onChange, staff }){
  const [text, setText] = React.useState("");
  const selected = value.map(id => staff.find(s => s.id === id)).filter(Boolean);
  const matches = staff
    .filter(s => !value.includes(s.id))
    .filter(s => text === "" || s.name.toLowerCase().includes(text.toLowerCase()) || (s.warrantNumber || "").toLowerCase().includes(text.toLowerCase()))
    .slice(0, 6);
  const add = (id) => { onChange([...value, id]); setText(""); };
  const remove = (id) => onChange(value.filter(v => v !== id));
  return (
    <div>
      {selected.length > 0 && (
        <div className="flex flex-wrap gap-1.5 mb-2">
          {selected.map(s => (
            <span key={s.id} className="inline-flex items-center gap-1.5 bg-brand-50 text-brand-600 dark:bg-brand-900/30 dark:text-brand-300 rounded-full pl-0.5 pr-2 py-0.5 text-[12px] font-medium">
              <Avatar name={s.name} photoId={s.photoId} size={18}/>
              {s.name}
              <button onClick={() => remove(s.id)} className="hover:opacity-70"><Ic.x width="11" height="11"/></button>
            </span>
          ))}
        </div>
      )}
      <div className="relative">
        <input value={text} onChange={e => setText(e.target.value)}
               placeholder={selected.length ? "Add another…" : "Search staff to add…"}
               className="w-full px-3 py-2 text-[13px] rounded-xl"/>
        {text && matches.length > 0 && (
          <div className="absolute top-full left-0 right-0 mt-1 bg-card border border-softline dark:border-ink-800 rounded-xl shadow-lift z-30 overflow-hidden">
            {matches.map(s => (
              <button key={s.id} onClick={() => add(s.id)}
                      className="w-full text-left px-3 py-2 text-[13px] hover:bg-canvas dark:hover:bg-ink-800/60 flex items-center gap-2">
                <Avatar name={s.name} photoId={s.photoId} size={22}/>
                <span className="flex-1">{s.name}</span>
                <span className="text-[11px] text-ink-400">{s.team} · {s.hub}</span>
              </button>
            ))}
          </div>
        )}
      </div>
      {selected.length > 0 && <div className="text-[11.5px] text-ink-500 mt-1.5">{selected.length} selected</div>}
    </div>
  );
}

function TaskForm({ task, onSave, onCancel }){
  const { store } = useStore();
  const [form, setForm] = React.useState(task || {
    title: "", description: "", category: "Welfare", priority: "medium",
    dueDate: "", assigneeId: "", recurrence: { type: "none" }, isChaser: false
  });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const valid = form.title.trim().length > 0;

  const submit = () => {
    if (!valid) return;
    onSave({
      ...form,
      isChaser: false,
      dueDate: form.dueDate ? new Date(form.dueDate).toISOString() : null
    });
  };

  return (
    <Modal open onClose={onCancel} title={task ? "Edit task" : "New task"} size="md"
           footer={<>
             <Button variant="ghost" onClick={onCancel}>Cancel</Button>
