<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Staff Console — Sussex Police</title>

<!-- Font: Carlito is a libre, metrically-compatible drop-in for Calibri.
     Used for everything — body, headings, UI — so the look is consistent. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Carlito:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          // Carlito everywhere — display and body use the same family so the dashboard
          // reads as a single clean Calibri-style typeface throughout. Hierarchy comes
          // from size and weight, not from a different font.
          display: ['Carlito', 'Calibri', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          sans:    ['Carlito', 'Calibri', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace']
        },
        colors: {
          // Surfaces — reference CSS variables so they flip in dark mode
          canvas:    'var(--bg)',
          card:      'var(--card)',
          softline:  'var(--line)',
          // Text
          ink: {
            900: '#0F1320',
            800: '#1A1F2E',
            700: '#2E3447',
            600: '#4B5163',
            500: '#6B7180',
            400: '#9CA2B3',
            300: '#C7CBD6'
          },
          // Brand and accents (cohesive cool palette with purple+blue dominant)
          brand: {
            50:  '#EEF2FF',
            100: '#E0E7FF',
            200: '#C7D2FE',
            300: '#A5B4FC',
            400: '#7C8BF7',
            500: '#5765E0',
            600: '#4250C2',
            700: '#343DA0',
            800: '#2A327F',
            900: '#222866'
          },
          violet: {
            50:  '#F4F0FF',
            100: '#E9E2FF',
            200: '#D4C5FF',
            300: '#B8A2FA',
            400: '#9B7CF0',
            500: '#7F5AE0',
            600: '#6841C8'
          },
          teal: {
            50:  '#E6FAF7',
            100: '#C5F2EA',
            500: '#0EAB94',
            600: '#0A8F7C'
          },
          rose: {
            50:  '#FFEEF1',
            100: '#FFD6DD',
            500: '#E84D6B',
            600: '#CC3753'
          },
          amber2: {
            50:  '#FFF4E0',
            100: '#FFE6B8',
            500: '#E89A1C',
            600: '#C77E10'
          },
          sky2: {
            50:  '#E5F2FF',
            100: '#C2DFFE',
            500: '#3A86F0',
            600: '#2A6CCC'
          }
        },
        boxShadow: {
          'card':  '0 1px 2px rgba(15,19,32,.04), 0 1px 3px rgba(15,19,32,.04)',
          'lift':  '0 4px 14px rgba(15,19,32,.06), 0 2px 6px rgba(15,19,32,.04)',
          'pop':   '0 18px 48px -16px rgba(15,19,32,.18), 0 8px 18px -8px rgba(15,19,32,.08)'
        },
        borderRadius: {
          'xl2': '1.1rem'
        }
      }
    }
  }
</script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

<!-- Spreadsheet parsing + zip workspace -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- React + Babel -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --bg:           #F6F7FB;
    --card:         #FFFFFF;
    --line:         #EBEDF3;
    --line-strong:  #D9DCE5;
    --ink-900:      #0F1320;
    --ink-700:      #2E3447;
    --ink-500:      #6B7180;
    --ink-400:      #9CA2B3;
    --brand:        #5765E0;
    --brand-soft:   #EEF2FF;
    --grid-dot:     rgba(15,19,32,.04);
  }
  .dark {
    --bg:           #0B0E18;
    --card:         #131726;
    --line:         #1E2436;
    --line-strong:  #2B3349;
    --ink-900:      #F4F5FA;
    --ink-700:      #C7CBD6;
    --ink-500:      #8B91A4;
    --ink-400:      #6B7180;
    --brand:        #7C8BF7;
    --brand-soft:   #1B2148;
    --grid-dot:     rgba(255,255,255,.045);
  }

  html, body, #root { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink-900);
    font-family: 'Carlito', 'Calibri', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* Palette overrides — these classes accept var(--c-accent) when the user sets a
     custom palette. Defaults to the original brand-500 #5765E0 if no variable set. */
  .bg-brand-500   { background-color: var(--c-accent, #5765E0) !important; }
  .text-brand-500 { color:            var(--c-accent, #5765E0) !important; }
  .text-brand-600 { color:            var(--c-accent, #4655D0) !important; }
  .border-brand-300, .border-brand-400, .border-brand-500 { border-color: var(--c-accent, #5765E0) !important; }
  .from-brand-500 { --tw-gradient-from: var(--c-accent, #5765E0) !important; }
  .ring-brand-300, .ring-brand-500 { --tw-ring-color: var(--c-accent, #5765E0) !important; }
  /* Active nav item */
  .nav-item.active { background: var(--c-accent-soft, rgba(87,101,224,0.12)) !important; color: var(--c-accent, #5765E0) !important; }

  /* Subtle dot grid as ambient texture */
  .app-bg {
    background-image: radial-gradient(circle at 1px 1px, var(--grid-dot) 1px, transparent 0);
    background-size: 18px 18px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-400); }

  /* Numeric tabular alignment for KPIs */
  .tnum { font-variant-numeric: tabular-nums; }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .anim-fade-up { animation: fadeUp .35s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  .anim-fade { animation: fadeIn .25s ease both; }

  @keyframes checkPop {
    0%   { transform: scale(.6); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .anim-check { animation: checkPop .35s cubic-bezier(.2,.8,.2,1) both; }

  /* Boot splash */
  .boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 999; transition: opacity .3s ease;
  }
  .boot.hide { opacity: 0; pointer-events: none; }
  .boot-dot {
    width: 8px; height: 8px; border-radius: 999px; background: var(--brand);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(.6); opacity: .35; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Card grid prevents reshuffle */
  .card-grid { display: grid; gap: 24px; }

  /* Soft hairline underline for cards on hover */
  .card-host { transition: box-shadow .2s ease, transform .2s ease; }
  .card-host:hover { box-shadow: 0 8px 24px -10px rgba(15,19,32,.10), 0 4px 12px -4px rgba(15,19,32,.05); }

  /* Leaflet override for our palette */
  .leaflet-container {
    background: var(--bg) !important;
    font-family: 'Carlito', 'Calibri', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    border-radius: 14px;
  }
  .leaflet-control-attribution {
    font-size: 10px !important;
    background: rgba(255,255,255,.85) !important;
  }
  .dark .leaflet-control-attribution {
    background: rgba(19,23,38,.85) !important;
    color: #C7CBD6 !important;
  }
  .dark .leaflet-control-attribution a { color: #A5B4FC !important; }
  .dark .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(.95) contrast(.85); }

  /* Pill chip */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600;
    letter-spacing: .01em;
  }

  /* Section heading line accent */
  .h-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    text-transform: uppercase; letter-spacing: .14em;
    font-size: 10.5px; font-weight: 700;
    color: var(--ink-500);
  }
  .h-eyebrow:before {
    content: ''; width: 14px; height: 2px;
    background: var(--brand); border-radius: 2px;
  }

  /* Strike-through for completed tasks with soft fade */
  .task-done { opacity: .55; }
  .task-done .task-title { text-decoration: line-through; text-decoration-thickness: 1.5px; }

  /* Progress ring */
  .ring-track { stroke: var(--line); }
  .ring-fill  { stroke: var(--brand); transition: stroke-dashoffset .5s ease; }

  /* Inputs */
  input, textarea, select {
    background: var(--card);
    color: var(--ink-900);
    border: 1px solid var(--line-strong);
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  input::placeholder, textarea::placeholder { color: var(--ink-400); }

  /* Dark-mode adaptation for light accent backgrounds.
     Tailwind utility classes are static, so any accent-50 background that
     wasn't given an explicit dark: variant gets toned down here instead. */
  .dark .bg-white { background-color: var(--card) !important; }
  .dark .bg-brand-50   { background-color: rgba(124,139,247,.12) !important; }
  .dark .bg-emerald-50 { background-color: rgba(16,171,148,.13) !important; }
  .dark .bg-rose-50    { background-color: rgba(232,77,107,.13) !important; }
  .dark .bg-amber2-50  { background-color: rgba(232,154,28,.14) !important; }
  .dark .bg-sky2-50    { background-color: rgba(58,134,240,.13) !important; }
  .dark .bg-teal-50    { background-color: rgba(14,171,148,.13) !important; }
  .dark .bg-violet-50  { background-color: rgba(155,124,240,.13) !important; }
  /* Light accent text stays readable on the dimmed dark backgrounds */
  .dark .text-brand-600   { color: #A5B4FC !important; }
  .dark .text-emerald-600 { color: #34D399 !important; }
  .dark .text-rose-600    { color: #FB7185 !important; }
  .dark .text-amber2-600  { color: #FBBF24 !important; }

  /* Sidebar item */
  .nav-item { transition: background .15s ease, color .15s ease; }
  .nav-item:hover { background: var(--brand-soft); color: var(--brand); }
  .nav-item.active {
    background: var(--brand-soft);
    color: var(--brand);
    font-weight: 600;
  }
  .nav-item.active .nav-dot { opacity: 1; }
  .nav-dot { opacity: 0; transition: opacity .15s ease; }

  /* Table row hover */
  .tr-row { transition: background .12s ease; user-select: none; }
  .tr-row:hover { background: rgba(87,101,224,.04); cursor: pointer; }
  .dark .tr-row:hover { background: rgba(124,139,247,.08); }

  /* Modal overlay */
  .modal-backdrop { background: rgba(15,19,32,.45); backdrop-filter: blur(4px); }

  /* Stagger reveal helper */
  .stagger > * { animation: fadeUp .4s cubic-bezier(.2,.7,.2,1) both; }
  .stagger > *:nth-child(1) { animation-delay: 0ms; }
  .stagger > *:nth-child(2) { animation-delay: 50ms; }
  .stagger > *:nth-child(3) { animation-delay: 100ms; }
  .stagger > *:nth-child(4) { animation-delay: 150ms; }
  .stagger > *:nth-child(5) { animation-delay: 200ms; }
  .stagger > *:nth-child(6) { animation-delay: 250ms; }
</style>
</head>
<body>
<div class="boot" id="boot"><div class="boot-dot"></div></div>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
/* =========================================================================
   STORAGE LAYER (v2 schema)
   Store metadata lives in localStorage; file blobs live in IndexedDB.
   ========================================================================= */
const STORAGE_KEY_V1 = "smd.store.v1";
const STORAGE_KEY_V2 = "smd.store.v2";

// ROLE is the single personnel field — replaces the old rank + staffType split.
const ROLES = ["PC", "Sergeant", "Police Staff", "Volunteer", "Special Constable"];
// Is this person currently on a restriction (secondment, long-term sick, etc.)?
// A restriction with no end date is treated as ongoing; with an end date, only
// "current" if that date hasn't passed.
function isOnRestriction(staff, asOf){
  const r = staff && staff.restriction;
  if (!r || !r.type) return false;
  if (!r.endDate) return true;
  const ref = asOf ? new Date(asOf) : new Date();
  return new Date(r.endDate) >= ref;
}
// Map spreadsheet role text → canonical role
const ROLE_NORMALISE = {
  "pc": "PC", "police constable": "PC", "constable": "PC",
  "sergeant": "Sergeant", "sgt": "Sergeant", "ps": "Sergeant",
  "police staff": "Police Staff", "staff": "Police Staff",
  "volunteer": "Volunteer", "vol": "Volunteer",
  "special constable": "Special Constable", "special": "Special Constable", "sc": "Special Constable"
};
// TEAM — Response or Investigations (was "department")
const TEAMS = ["Response", "Investigations"];
// HUB — the geographic base. Current live hubs; more can be added/archived in Settings.
const HUBS = ["Worthing", "Horsham"];
// Everyday availability status.
const STATUSES = ["Active", "On Leave", "Training"];
// Restriction / absence types — each carries an end date. A person can be Active AND on a
// restriction; restrictions are tracked separately on staff.restriction = { type, endDate }.
// Editable in Settings via settings.restrictionTypes.
const RESTRICTION_TYPES = ["Secondment", "Long-term sick", "Attachment", "Restricted/Suspended"];
const TASK_CATEGORIES = ["Welfare", "Performance", "Training", "Equipment", "Misconduct", "Operational", "Admin"];

// Operational capabilities — fixed columns from the E-section spreadsheet.
// Each is tri-plus-state: "yes" | "booked" | "no" | "unknown".
const CAPABILITIES = [
  { key: "blues",   label: "Blues",   full: "Blue light / response driving" },
  { key: "taser",   label: "Taser",   full: "Taser trained" },
  { key: "pursuit", label: "Pursuit", full: "Pursuit authorised" },
  { key: "psu",     label: "PSU",     full: "Public order (PSU)" },
  { key: "moe",     label: "MOE",     full: "Method of entry" },
  { key: "dirfit",  label: "Dirfit",  full: "Dirfit / Drugwipe" },
  { key: "ebti",    label: "EBTI",    full: "EBTI" }
];
const CAP_STATES = ["yes", "booked", "no", "unknown"];
const CAP_STATE_META = {
  yes:     { label: "Yes",     tone: "success", chip: "Yes" },
  booked:  { label: "Booked",  tone: "amber",   chip: "Booked" },
  no:      { label: "No",      tone: "rose",    chip: "No" },
  unknown: { label: "Not recorded", tone: "neutral", chip: "—" }
};
// Parse a raw spreadsheet cell into a capability state
function parseCapState(raw){
  if (raw == null || String(raw).trim() === "") return "unknown";
  const s = String(raw).trim().toLowerCase();
  if (s === "yes" || s === "y") return "yes";
  if (s === "booked" || s === "booking" || s === "tbc") return "booked";
  if (s === "no" || s === "n") return "no";
  return "unknown";
}
function blankCapabilities(){
  const c = {};
  CAPABILITIES.forEach(cap => { c[cap.key] = "unknown"; });
  return c;
}

// File scopes for the virtual file system
const FILE_SCOPES = ["officer", "team", "global"];

const DEFAULT_STORE = () => ({
  version: 2.4,
  staff: [],
  tasks: [],
  files: [],          // metadata only — { id, name, size, type, scope, scopeId, folder, uploadedAt }
  imports: [],        // history of spreadsheet imports — { id, at, fileName, added, updated, missing[] }
  auditLog: [],       // append-only change log — { id, at, kind, summary }
  settings: {
    theme: "light",
    showDocsPanel: true,
    // Branding — appears in the header and on exports
    teamName: "",
    ownerName: "",
    // Logo: an IndexedDB key. Blob lives outside localStorage so it doesn't bloat saves.
    logoId: null,
    // Colour palette — three zones, each can be a preset name or "custom".
    // The CSS variables --c-header / --c-sidebar / --c-accent drive the live render.
    palette: {
      preset: "default",       // "default" | preset name | "custom"
      header:  "#FFFFFF",      // header bar
      sidebar: "#FFFFFF",      // sidebar background
      accent:  "#5765E0"       // primary brand colour — buttons, active states, charts
    },
    teams: ["Response", "Investigations"],
    hubs: ["Worthing", "Horsham"],
    // Archived hubs stay in the data but drop out of active filters
    archivedHubs: [],
    // Headcount targets per hub — drives the staffing-level indicator on the dashboard
    maxHubSizes: { Worthing: 30, Horsham: 25 },
    roles: ROLES,
    statuses: STATUSES,
    // Restriction / absence types — each instance carries an end date
    restrictionTypes: RESTRICTION_TYPES,
    tags: ["Taser", "Public Order Lv2", "Method of Entry", "Search Trained", "Cyber", "Standard Driver", "Response Driver", "Pursuit", "Drone", "FLO", "Mental Health First Aid"],
    categories: TASK_CATEGORIES,
    pinnedView: "overview"
  }
});

// Bring a staff record up to current shape — idempotent
function upgradeStaff(s){
  const u = { ...s };
  // Warrant number replaces collar number
  if (!u.warrantNumber && u.collarNumber) u.warrantNumber = u.collarNumber;
  if (!u.warrantNumber) u.warrantNumber = "";
  // Split name into first/last if not already split
  if (!u.firstName && !u.lastName && u.name) {
    const parts = u.name.trim().split(/\s+/);
    u.firstName = parts[0] || "";
    u.lastName  = parts.slice(1).join(" ") || "";
  }
  if (!u.firstName) u.firstName = "";
  if (!u.lastName)  u.lastName  = "";
  if ((u.firstName || u.lastName) && !u.name) u.name = (u.firstName + " " + u.lastName).trim();

  // --- v2.4: single ROLE field (was rank + staffType) ---
  if (u.role == null || u.role === "") {
    // Derive from old rank/staffType
    const rawRank = (u.rank || "").toString();
    if (/sergeant/i.test(rawRank) && !/detective/i.test(rawRank)) u.role = "Sergeant";
    else if (/sergeant/i.test(rawRank)) u.role = "Sergeant";   // DS folds to Sergeant
    else if (/police staff|^staff$|senior police staff/i.test(rawRank) || u.staffType === "Police Staff") u.role = "Police Staff";
    else if (/special/i.test(rawRank) || u.staffType === "Special Constable") u.role = "Special Constable";
    else if (/volunteer/i.test(rawRank) || u.staffType === "Volunteer") u.role = "Volunteer";
    else u.role = "PC";   // PC, DC, PCSO, Inspector all collapse to PC for this division's model
  }
  delete u.rank;
  delete u.staffType;

  // --- v2.4: TEAM = Response/Investigations (was `department`) ---
  if (u.team == null || u.team === "") {
    if (u.department && TEAMS.includes(u.department)) u.team = u.department;
    else if (u.team === "Response" || u.team === "Investigations") { /* keep */ }
    else u.team = "Response";
  }
  delete u.department;

  // --- v2.4: HUB = geographic base (was `area`, absorbing the old DRT/RIT field) ---
  if (u.hub == null || u.hub === "") {
    u.hub = (u.area || "Worthing");
  }
  delete u.area;
  delete u.cohort;

  // --- acting flag (was supervisor: "acting") ---
  if (u.acting == null) {
    u.acting = u.supervisor === "acting"
            || (u.actingRank && /sgt|sergeant/i.test(u.actingRank))
            || u.supervisor === "acting-sergeant"
            || false;
  }
  delete u.supervisor;
  delete u.actingRank;
  if (u.status === "Acting Up") u.status = "Active";

  // --- v2.4: restriction = { type, endDate } | null, separate from availability status ---
  if (u.restriction === undefined) {
    // Old flat status list folded Sick/Secondment into status — lift them out
    if (u.status === "Secondment")    u.restriction = { type: "Secondment", endDate: u.endDate || null };
    else if (u.status === "Sick")     u.restriction = { type: "Long-term sick", endDate: null };
    else u.restriction = null;
  }
  // Normalise availability status to the current short list
  if (!STATUSES.includes(u.status)) {
    u.status = (u.status === "On Leave") ? "On Leave"
             : (u.status === "Training") ? "Training"
             : "Active";
  }

  // resigned now means "resigned OR moved off my team" — keep the boolean, broaden the meaning
  if (u.resigned == null) u.resigned = false;
  delete u.ritRotation;

  // Dates — both optional
  if (u.startedDate == null) u.startedDate = u.startDate || null;
  if (u.endDate == null)     u.endDate = null;
  delete u.startDate;

  // Capabilities, import tracking, note
  if (u.capabilities == null) u.capabilities = blankCapabilities();
  else u.capabilities = { ...blankCapabilities(), ...u.capabilities };
  if (u.inLatestImport == null) u.inLatestImport = true;
  if (u.note == null) u.note = u.notes || "";
  delete u.notes;
  // Photo — an IndexedDB key, optional. The blob lives outside localStorage.
  if (u.photoId === undefined) u.photoId = null;

  // Email — Sussex Police format firstname.lastname@sussex.police.uk by default.
  // Editable in the staff form for oddities (hyphenated names, force transfers, etc.)
  if (u.email == null) u.email = "";
  if (u.email === "" && u.firstName && u.lastName) {
    // Strip apostrophes (O'DONNELL), keep alphanumerics and hyphens
    const clean = s => (s || "").toString().trim().toLowerCase().replace(/[^a-z0-9\-]/g, "");
    const fn = clean(u.firstName);
    const ln = clean(u.lastName);
    if (fn && ln) u.email = `${fn}.${ln}@sussex.police.uk`;
  }

  // Standard defaults
  u.role = u.role || "PC";
  u.team = u.team || "Response";
  u.hub  = u.hub  || "Worthing";
  return u;
}

// Bring a task up to current shape — chaser support
function upgradeTask(t){
  const u = { ...t };
  if (u.isChaser == null) u.isChaser = false;
  // Chasers carry assigneeIds (array); regular tasks keep assigneeId (single).
  if (u.isChaser && u.assigneeIds == null) {
    u.assigneeIds = u.assigneeId ? [u.assigneeId] : [];
  }
  if (!u.recurrence) u.recurrence = { type: "none" };
  return u;
}

function migrateV1toV2(v1){
  const next = DEFAULT_STORE();
  if (v1.staff)   next.staff   = v1.staff.map(upgradeStaff);
  if (v1.tasks)   next.tasks   = v1.tasks.map(upgradeTask);
  if (v1.files)   next.files   = v1.files;
  if (v1.settings) next.settings = { ...next.settings, ...v1.settings };
  return next;
}

// Apply latest-schema upgrade to an already-loaded store
function ensureCurrent(store){
  const def = DEFAULT_STORE();
  const next = {
    ...def,
    ...store,
    version: 2.4,
    staff: (store.staff || []).map(upgradeStaff),
    tasks: (store.tasks || []).map(upgradeTask),
    imports: store.imports || [],
    auditLog: Array.isArray(store.auditLog) ? store.auditLog : []
  };
  // Drop the retired training subsystem if a legacy store still carries it.
  delete next.trainingCourses;
  delete next.trainingRecords;
  // settings merge
  const s = store.settings || {};
  next.settings = { ...def.settings, ...s };
  // Teams: only reset if it looks like the legacy DRT/RIT shape, never just because
  // someone customised the names. Custom values like "Patrol"/"CID" must persist.
  if (!Array.isArray(next.settings.teams) || next.settings.teams.length === 0
      || next.settings.teams.includes("DRT") || next.settings.teams.includes("None")) {
    next.settings.teams = def.settings.teams;
  }
  // hubs: derive from old departments list if it looks geographic, else default
  if (!next.settings.hubs || !Array.isArray(next.settings.hubs) || next.settings.hubs.length === 0) {
    next.settings.hubs = def.settings.hubs;
  }
  if (!Array.isArray(next.settings.archivedHubs)) next.settings.archivedHubs = [];
  // maxHubSizes: migrate from old maxTeamSizes if present, else default
  if (!next.settings.maxHubSizes) {
    next.settings.maxHubSizes = def.settings.maxHubSizes;
  }
  // Ensure every hub a staff member uses actually exists in the hubs list
  const usedHubs = new Set(next.staff.map(p => p.hub).filter(Boolean));
  usedHubs.forEach(h => { if (!next.settings.hubs.includes(h)) next.settings.hubs.push(h); });
  // restriction types and statuses — editable lists, default if absent
  if (!Array.isArray(next.settings.restrictionTypes) || next.settings.restrictionTypes.length === 0) {
    next.settings.restrictionTypes = def.settings.restrictionTypes;
  }
  if (!Array.isArray(next.settings.statuses) || next.settings.statuses.length === 0) {
    next.settings.statuses = def.settings.statuses;
  }
  // Branding — default to empty strings if absent
  if (typeof next.settings.teamName !== "string")  next.settings.teamName  = "";
  if (typeof next.settings.ownerName !== "string") next.settings.ownerName = "";
  if (next.settings.logoId === undefined) next.settings.logoId = null;
  // Palette — three zones with safe fallbacks
  if (!next.settings.palette || typeof next.settings.palette !== "object") {
    next.settings.palette = def.settings.palette;
  } else {
    next.settings.palette = { ...def.settings.palette, ...next.settings.palette };
  }
  // drop dead settings keys
  delete next.settings.departments;
  delete next.settings.maxTeamSizes;
  return next;
}

function loadStore(){
  try {
    const v2 = localStorage.getItem(STORAGE_KEY_V2);
    if (v2) {
      const parsed = ensureCurrent(JSON.parse(v2));
      localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(parsed));
      return parsed;
    }
    const v1 = localStorage.getItem(STORAGE_KEY_V1);
    if (v1) {
      const migrated = migrateV1toV2(JSON.parse(v1));
      localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(migrated));
      return migrated;
    }
  } catch(e) { console.warn("loadStore failed", e); }
  return DEFAULT_STORE();
}
// Quick sanity check — confirms localStorage actually works in this context.
// file:// origins on some browsers silently drop writes, which is the most common
// reason "the dashboard doesn't save my updates" — we surface that loud and early.
function testPersistence(){
  try {
    const k = "__smd_persist_check__";
    localStorage.setItem(k, "1");
    const ok = localStorage.getItem(k) === "1";
    localStorage.removeItem(k);
    return ok;
  } catch (e) { return false; }
}
function saveStore(s){
  try {
    localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(s));
    return { ok: true, at: Date.now() };
  } catch(e){
    if (e.name === "QuotaExceededError") {
      return { ok: false, reason: "quota" };
    }
    console.error("saveStore failed", e);
    return { ok: false, reason: "error", message: e.message };
  }
}

/* =========================================================================
   FILE STORE — IndexedDB
   Blobs are kept out of localStorage so the file system can hold real volume.
   The store's `files` array holds only metadata; blobs are keyed by file id.
   ========================================================================= */
const IDB_NAME = "smd.files";
const IDB_STORE = "blobs";
let _idbPromise = null;

function openFileDB(){
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error("IndexedDB unavailable")); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _idbPromise;
}
async function idbPut(id, dataUrl){
  const db = await openFileDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(dataUrl, id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(id){
  const db = await openFileDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
async function idbDelete(id){
  const db = await openFileDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbAllKeys(){
  const db = await openFileDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).getAllKeys();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

/* =========================================================================
   UTILITIES
   ========================================================================= */
const uid = (p="id") => `${p}_${Math.random().toString(36).slice(2,9)}${Date.now().toString(36).slice(-4)}`;

const fmt = {
  date: iso => {
    if (!iso) return "—";
    try { return new Date(iso).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }); }
    catch { return iso; }
  },
  dateInput: iso => {
    if (!iso) return "";
    try { return new Date(iso).toISOString().slice(0,10); } catch { return ""; }
  },
  dateTime: iso => {
    if (!iso) return "—";
    try { return new Date(iso).toLocaleString("en-GB", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" }); }
    catch { return iso; }
  },
  bytes: n => {
    if (!n && n!==0) return "—";
    const u = ["B","KB","MB"]; let i=0;
    while (n>=1024 && i<u.length-1) { n/=1024; i++; }
    return `${n.toFixed(n<10?1:0)} ${u[i]}`;
  },
  shortName: full => {
    if (!full) return "?";
    const p = full.trim().split(/\s+/);
    return (p[0][0] + (p[p.length-1]?.[0] || "")).toUpperCase();
  }
};

function daysBetween(a, b){
  if (!a || !b) return null;
  const ms = new Date(b).getTime() - new Date(a).getTime();
  return Math.floor(ms / 86400000);
}
function addMonths(isoDate, n){
  const d = new Date(isoDate);
  d.setMonth(d.getMonth() + n);
  return d.toISOString();
}
function startOfDayIso(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString();
}
function advanceDue(dueIso, rec){
  if (!rec || !rec.type || rec.type === "none") return null;
  const d = new Date(dueIso);
  if (rec.type === "daily")   d.setDate(d.getDate() + 1);
  if (rec.type === "weekly")  d.setDate(d.getDate() + 7);
  if (rec.type === "monthly") d.setMonth(d.getMonth() + 1);
  if (rec.type === "custom" && rec.intervalDays) d.setDate(d.getDate() + Number(rec.intervalDays));
  return d.toISOString();
}
function classifyTask(t){
  if (t.completed) return "done";
  if (!t.dueDate) return "open";
  const days = daysBetween(startOfDayIso(), t.dueDate);
  if (days < 0)  return "overdue";
  if (days <= 3) return "soon";
  return "open";
}
function validateEmail(s){
  if (!s) return true;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
}

/* =========================================================================
   SPREADSHEET IMPORT
   The reformatted workbook has a single header row, then one row per person.
   Columns: Name, Warrant, Role, Team, Hub, Acting, Resigned/Moved,
   Started, End, Blues, Taser, Pursuit, PSU, MOE, Dirfit, EBTI, Note.
   We still parse tolerantly — header order doesn't matter, extra columns
   are ignored, and the old E-section two-block layout still works.
   ========================================================================= */

// Normalise a header cell to a known field key
const HEADER_MAP = {
  "name": "name",
  "warrant number": "warrantNumber",
  "warrant": "warrantNumber",
  "warrant no": "warrantNumber",
  "role": "role",
  "rank": "role",
  "team": "team",
  "hub": "hub",
  "station": "hub",
  "department": "team",        // legacy sheets: Department → Team
  "dept": "team",
  "acting": "acting",
  "acting sgt": "acting",
  "resigned": "resigned",
  "resigned/moved": "resigned",
  "resigned or moved": "resigned",
  "moved": "resigned",
  "started": "startedDate",
  "start date": "startedDate",
  "started date": "startedDate",
  "end": "endDate",
  "end date": "endDate",
  "leaving date": "endDate",
  "restriction": "restrictionType",
  "restriction type": "restrictionType",
  "restriction end": "restrictionEnd",
  "restriction end date": "restrictionEnd",
  "blues": "cap_blues",
  "taser": "cap_taser",
  "pursuit": "cap_pursuit",
  "psu": "cap_psu",
  "moe": "cap_moe",
  "dirfit/drugwipe": "cap_dirfit",
  "dirfit": "cap_dirfit",
  "drugwipe": "cap_dirfit",
  "ebti": "cap_ebti",
  "note": "note",
  "notes": "note"
};

// Coerce a spreadsheet truthy cell ("y", "yes", "true", "1", "x") to a boolean
function parseBool(v){
  if (v == null) return false;
  return /^(y|yes|true|1|✓|x)$/i.test(String(v).trim());
}
// Coerce a date-ish cell to an ISO string, or null
function parseSheetDate(v){
  if (v == null || String(v).trim() === "") return null;
  const d = new Date(v);
  return isNaN(d.getTime()) ? null : d.toISOString();
}

// Split "Surname, FORENAME" or "Forename SURNAME" into {firstName, lastName}
function splitOfficerName(raw){
  if (!raw) return { firstName: "", lastName: "" };
  const s = String(raw).trim();
  if (s.includes(",")) {
    // The sheet uses "Forename, SURNAME" — first part is forename
    const [a, b] = s.split(",").map(x => x.trim());
    return { firstName: a || "", lastName: b || "" };
  }
  const parts = s.split(/\s+/);
  if (parts.length === 1) return { firstName: parts[0], lastName: "" };
  return { firstName: parts[0], lastName: parts.slice(1).join(" ") };
}

// Parse an array-of-arrays sheet into staff records
function parseEsectionRows(rows){
  const people = [];
  let header = null;       // current header field map: colIndex -> fieldKey
  for (let r = 0; r < rows.length; r++){
    const row = rows[r] || [];
    const firstCell = (row[0] == null ? "" : String(row[0])).trim().toLowerCase();

    // Header row?
    if (firstCell === "name") {
      header = {};
      row.forEach((cell, ci) => {
        const key = HEADER_MAP[(cell == null ? "" : String(cell)).trim().toLowerCase()];
        if (key) header[ci] = key;
      });
      continue;
    }

    // Blank row — ends a block but keep header in case another block follows with same shape
    const isBlank = row.every(c => c == null || String(c).trim() === "");
    if (isBlank) continue;

    if (!header) continue;  // data before any header — skip

    // Build a record from this row
    const rec = { capabilities: blankCapabilities() };
    Object.entries(header).forEach(([ci, key]) => {
      const val = row[ci];
      if (key.startsWith("cap_")) {
        rec.capabilities[key.slice(4)] = parseCapState(val);
      } else {
        rec[key] = val == null ? "" : String(val).trim();
      }
    });

    if (!rec.name && !rec.warrantNumber) continue;  // nothing useful

    const { firstName, lastName } = splitOfficerName(rec.name);
    // Role — normalise from the sheet text
    const roleNorm = (rec.role || "").trim().toLowerCase();
    const role = ROLE_NORMALISE[roleNorm] || "PC";
    // Team — Response or Investigations (legacy sheets may have an Investigations/DRT block)
    const teamRaw = (rec.team || "").trim();
    const team = /investigation/i.test(teamRaw) ? "Investigations"
               : /response/i.test(teamRaw) ? "Response"
               : (TEAMS.includes(teamRaw) ? teamRaw : "Response");
    // Hub — the geographic base
    const hubRaw = (rec.hub || "").trim();
    const hub = HUBS.includes(hubRaw) ? hubRaw : (hubRaw || "Worthing");
    // Acting — from an explicit column, or a note like "Acting Sgt"
    const acting = parseBool(rec.acting) || /acting\s*(sgt|sergeant)/i.test(rec.note || "");
    // Restriction — optional { type, endDate }; only set if a recognised type is given
    const restrictionRaw = (rec.restrictionType || "").trim();
    const restriction = restrictionRaw
      ? { type: restrictionRaw, endDate: parseSheetDate(rec.restrictionEnd) }
      : null;

    people.push({
      firstName, lastName,
      name: (firstName + " " + lastName).trim(),
      warrantNumber: (rec.warrantNumber || "").trim(),
      role,
      team,
      hub,
      acting,
      resigned: parseBool(rec.resigned),
      restriction,
      startedDate: parseSheetDate(rec.startedDate),
      endDate: parseSheetDate(rec.endDate),
      capabilities: rec.capabilities,
      note: rec.note || ""
    });
  }
  return people;
}

// Read an xlsx File object → array of parsed officer records
function readEsectionFile(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        if (typeof XLSX === "undefined") { reject(new Error("Spreadsheet library failed to load")); return; }
        const wb = XLSX.read(e.target.result, { type: "array" });
        // Use the first sheet, or one literally called Export
        const sheetName = wb.SheetNames.includes("Export") ? "Export" : wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: true, defval: null });
        const people = parseEsectionRows(rows);
        if (people.length === 0) { reject(new Error("No officer rows found. Is this an E-section export?")); return; }
        resolve(people);
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error("Could not read the file"));
    reader.readAsArrayBuffer(file);
  });
}

// Diff parsed import against current staff. Match on warrant number, fall back to name.
function diffImport(parsed, currentStaff){
  const byWarrant = {};
  const byName = {};
  currentStaff.forEach(s => {
    if (s.warrantNumber) byWarrant[s.warrantNumber.toLowerCase()] = s;
    byName[(s.name || "").toLowerCase()] = s;
  });
  const matchedIds = new Set();
  const added = [], updated = [];
  parsed.forEach(p => {
    let existing = null;
    if (p.warrantNumber && byWarrant[p.warrantNumber.toLowerCase()]) {
      existing = byWarrant[p.warrantNumber.toLowerCase()];
    } else if (byName[(p.name || "").toLowerCase()]) {
      existing = byName[(p.name || "").toLowerCase()];
    }
    if (existing) {
      matchedIds.add(existing.id);
      updated.push({ id: existing.id, before: existing, after: p });
    } else {
      added.push(p);
    }
  });
  // Anyone in current staff not matched by this import
  const missing = currentStaff.filter(s => !matchedIds.has(s.id));
  return { added, updated, missing };
}

/* =========================================================================
   STORE CONTEXT
   ========================================================================= */
const StoreContext = React.createContext(null);
const useStore = () => React.useContext(StoreContext);

function StoreProvider({ children }){
  const [store, setStore] = React.useState(() => loadStore());
  // Save state — lets the UI show "Saved 14:32" or "Save failed", and warn on file://
  const [saveState, setSaveState] = React.useState(() => ({
    ok: testPersistence(),
    at: null,
    persistent: testPersistence(),
    reason: testPersistence() ? null : "blocked"
  }));

  // Autosave on every store change (debounced via the React render cycle).
  // We track the result so the header can show a save indicator and surface failures.
  React.useEffect(() => {
    const result = saveStore(store);
    setSaveState(s => ({ ...s, ...result }));
  }, [store]);

  // Theme application
  React.useEffect(() => {
    const root = document.documentElement;
    if (store.settings.theme === "dark") root.classList.add("dark");
    else root.classList.remove("dark");
  }, [store.settings.theme]);

  // Palette application — pushes the three zone colours into CSS variables so any
  // rule referencing var(--c-header), var(--c-sidebar) or var(--c-accent) updates live.
  // Also derives a couple of accent shades (soft tint, contrast text) used by buttons/pills.
  React.useEffect(() => {
    const p = store.settings.palette;
    if (!p) return;
    const root = document.documentElement;
    root.style.setProperty("--c-header",  p.header  || "#FFFFFF");
    root.style.setProperty("--c-sidebar", p.sidebar || "#FFFFFF");
    root.style.setProperty("--c-accent",  p.accent  || "#5765E0");
    // Soft tint of accent (used for hover bg) — naive 12% alpha applied via rgba
    const hexToRgb = h => {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h || "");
      return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [87,101,224];
    };
    const [r, g, b] = hexToRgb(p.accent);
    root.style.setProperty("--c-accent-soft", `rgba(${r}, ${g}, ${b}, 0.12)`);
    // Pick black or white text against the accent based on luminance
    const lum = (0.299*r + 0.587*g + 0.114*b);
    root.style.setProperty("--c-accent-ink", lum > 160 ? "#0F1320" : "#FFFFFF");
  }, [store.settings.palette]);

  const api = React.useMemo(() => ({
    store, setStore, saveState,

    // STAFF
    addStaff: (s) => setStore(p => ({ ...p, staff: [...p.staff, { id: uid("stf"), createdAt: new Date().toISOString(), tags:[], ...s }] })),
    addStaffBulk: (arr) => setStore(p => ({
      ...p,
      staff: [...p.staff, ...arr.map(s => ({ id: uid("stf"), createdAt: new Date().toISOString(), tags:[], status: "Active", ...s }))]
    })),
    updateStaff: (id, patch) => setStore(p => ({ ...p, staff: p.staff.map(s => s.id===id ? { ...s, ...patch } : s) })),
    removeStaff: (id) => setStore(p => ({
      ...p,
      staff: p.staff.filter(s => s.id !== id),
      tasks: p.tasks
        .filter(t => t.assigneeId !== id || t.isChaser)
        .map(t => t.isChaser ? { ...t, assigneeIds: (t.assigneeIds || []).filter(aid => aid !== id) } : t),
      files: p.files.filter(f => !(f.scope === "officer" && f.scopeId === id))
    })),

    // TASKS — regular tasks carry assigneeId; chasers carry assigneeIds (array) + isChaser
    addTask: (t) => setStore(p => ({ ...p, tasks: [...p.tasks, { id: uid("tsk"), createdAt: new Date().toISOString(), completed: false, isChaser: false, ...t }] })),
    updateTask: (id, patch) => setStore(p => ({ ...p, tasks: p.tasks.map(t => t.id===id ? { ...t, ...patch } : t) })),
    removeTask: (id) => setStore(p => ({ ...p, tasks: p.tasks.filter(t => t.id !== id) })),
    completeTask: (id) => setStore(p => ({
      ...p,
      tasks: p.tasks.map(t => {
        if (t.id !== id) return t;
        if (t.recurrence && t.recurrence.type && t.recurrence.type !== "none" && t.dueDate) {
          // Roll forward — don't close
          return { ...t, dueDate: advanceDue(t.dueDate, t.recurrence), lastCompletedAt: new Date().toISOString() };
        }
        return { ...t, completed: true, completedAt: new Date().toISOString() };
      })
    })),
    reopenTask: (id) => setStore(p => ({ ...p, tasks: p.tasks.map(t => t.id===id ? { ...t, completed:false, completedAt: null } : t) })),

    // CAPABILITIES — set one capability state for one officer
    setCapability: (staffId, capKey, state) => setStore(p => ({
      ...p,
      staff: p.staff.map(s => s.id === staffId
        ? { ...s, capabilities: { ...blankCapabilities(), ...s.capabilities, [capKey]: state } }
        : s)
    })),

    // FILES — metadata in the store, blob already written to IndexedDB by caller.
    // scope: "officer" | "team" | "global"; scopeId: warrant number, team name, or "" for global.
    addFileMeta: (meta) => setStore(p => ({
      ...p,
      files: [...p.files, { id: meta.id, uploadedAt: new Date().toISOString(), ...meta }]
    })),
    removeFileMeta: (id) => setStore(p => ({ ...p, files: p.files.filter(f => f.id !== id) })),
    renameFile: (id, name) => setStore(p => ({ ...p, files: p.files.map(f => f.id === id ? { ...f, name } : f) })),

    // SPREADSHEET IMPORT — apply a reviewed diff
    applyImport: (diff, fileName) => setStore(p => {
      const now = new Date().toISOString();
      let staff = [...p.staff];
      // Mark everyone not in this import
      const inImport = new Set();

      // Updates — merge spreadsheet fields onto existing records, keep dashboard-only fields
      diff.updated.forEach(u => {
        inImport.add(u.id);
        staff = staff.map(s => s.id === u.id ? {
          ...s,
          firstName: u.after.firstName || s.firstName,
          lastName:  u.after.lastName  || s.lastName,
          name:      u.after.name      || s.name,
          warrantNumber: u.after.warrantNumber || s.warrantNumber,
          role:      u.after.role      || s.role,
          team:      u.after.team      || s.team,
          hub:       u.after.hub       || s.hub,
          acting:    u.after.acting != null ? u.after.acting : s.acting,
          resigned:  u.after.resigned != null ? u.after.resigned : s.resigned,
          restriction: u.after.restriction !== undefined ? u.after.restriction : s.restriction,
          startedDate: u.after.startedDate != null ? u.after.startedDate : s.startedDate,
          endDate:   u.after.endDate != null ? u.after.endDate : s.endDate,
          capabilities: { ...blankCapabilities(), ...s.capabilities, ...u.after.capabilities },
          note:      u.after.note != null && u.after.note !== "" ? u.after.note : s.note,
          inLatestImport: true
        } : s);
      });

      // Additions
      const addedRecords = diff.added.map(a => {
        const id = uid("stf");
        inImport.add(id);
        return upgradeStaff({
          id, createdAt: now, tags: [], status: "Active",
          ...a, inLatestImport: true
        });
      });
      staff = [...staff, ...addedRecords];

      // Mark missing
      staff = staff.map(s => inImport.has(s.id) ? s : { ...s, inLatestImport: false });

      const importRecord = {
        id: uid("imp"), at: now, fileName: fileName || "spreadsheet",
        added: diff.added.length, updated: diff.updated.length,
        missing: diff.missing.map(m => ({ id: m.id, name: m.name, warrantNumber: m.warrantNumber }))
      };

      return { ...p, staff, imports: [importRecord, ...(p.imports || [])].slice(0, 20) };
    }),

    // SETTINGS
    setSetting: (key, val) => setStore(p => ({ ...p, settings: { ...p.settings, [key]: val } })),
    setPalette: (patch) => setStore(p => ({
      ...p,
      settings: { ...p.settings, palette: { ...(p.settings.palette || {}), ...patch } }
    })),
    setMaxHubSize: (hub, size) => setStore(p => ({
      ...p,
      settings: { ...p.settings, maxHubSizes: { ...(p.settings.maxHubSizes || {}), [hub]: size } }
    })),
    // Archive / unarchive a hub — archived hubs drop out of active filters but keep their staff
    setHubArchived: (hub, archived) => setStore(p => {
      const cur = p.settings.archivedHubs || [];
      const next = archived ? [...new Set([...cur, hub])] : cur.filter(h => h !== hub);
      return { ...p, settings: { ...p.settings, archivedHubs: next } };
    }),
    addHub: (hub) => setStore(p => {
      const h = (hub || "").trim();
      if (!h || (p.settings.hubs || []).includes(h)) return p;
      return { ...p, settings: { ...p.settings, hubs: [...(p.settings.hubs || []), h] } };
    }),
    addToList: (key, value) => setStore(p => {
      const list = p.settings[key] || [];
      if (list.includes(value)) return p;
      return { ...p, settings: { ...p.settings, [key]: [...list, value] } };
    }),
    removeFromList: (key, value) => setStore(p => ({
      ...p,
      settings: { ...p.settings, [key]: (p.settings[key] || []).filter(v => v !== value) }
    })),

    // BULK
    replaceStore: (next) => setStore(ensureCurrent(next)),
    resetStore: () => setStore(DEFAULT_STORE()),
    loadSampleData: () => setStore(buildSampleStore())

  }), [store, saveState]);

  return <StoreContext.Provider value={api}>{children}</StoreContext.Provider>;
}

/* =========================================================================
   PRIMITIVES
   ========================================================================= */
// Sidebar/header logo — pulls the blob from IndexedDB by logoId. Falls back to the
// gradient brand badge when no logo is set.
function Logo({ logoId, size = 36 }){
  const [src, setSrc] = React.useState(null);
  React.useEffect(() => {
    let cancelled = false;
    if (!logoId) { setSrc(null); return; }
    idbGet(logoId).then(dataUrl => { if (!cancelled) setSrc(dataUrl || null); }).catch(()=>{});
    return () => { cancelled = true; };
  }, [logoId]);
  if (src) {
    return (
      <div className="rounded-xl overflow-hidden bg-canvas dark:bg-ink-800 shrink-0"
           style={{ width:size, height:size }}>
        <img src={src} alt="Logo" style={{ width:"100%", height:"100%", objectFit:"contain", display:"block" }}/>
      </div>
    );
  }
  return (
    <div className="rounded-xl flex items-center justify-center text-white shadow-sm shrink-0"
         style={{ width:size, height:size, background: "linear-gradient(135deg, var(--c-accent, #5765E0), #9B7CF0)" }}>
      <Ic.badge width={Math.floor(size * 0.55)} height={Math.floor(size * 0.55)}/>
    </div>
  );
}

// Wraps a staff name as a mailto link when an email is present. Used everywhere a
// name renders so officers are one click away from a draft email. The underline only
// shows on hover so it doesn't look like every name is a tagged link in the list view.
function StaffNameLink({ staff, className = "" }){
  const name = staff && staff.name;
  if (!staff || !staff.email) return <span className={className}>{name}</span>;
  return (
    <a href={`mailto:${staff.email}`}
       onClick={e => e.stopPropagation()}
       className={`${className} hover:underline decoration-dotted underline-offset-2`}
       title={`Email ${staff.email}`}>
      {name}
    </a>
  );
}

function Avatar({ name, size = 36, tone, photoId }){
  const initials = fmt.shortName(name);
  const hue = (name || "?").split("").reduce((a,c) => (a + c.charCodeAt(0)) % 360, 0);
  const bg = tone || `hsl(${hue} 70% 92%)`;
  const fg = `hsl(${hue} 50% 32%)`;
  // If a photoId is supplied, try to load the blob from IndexedDB once and cache the data URL.
  const [photo, setPhoto] = React.useState(null);
  React.useEffect(() => {
    let cancelled = false;
    if (!photoId) { setPhoto(null); return; }
    idbGet(photoId).then(dataUrl => { if (!cancelled) setPhoto(dataUrl || null); }).catch(()=>{});
    return () => { cancelled = true; };
  }, [photoId]);
  if (photo) {
    return (
      <div className="rounded-full overflow-hidden bg-canvas dark:bg-ink-800"
           style={{ width:size, height:size }}
           title={name}>
        <img src={photo} alt={name || ""} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }}/>
      </div>
    );
  }
  return (
    <div className="rounded-full font-semibold flex items-center justify-center font-display"
         style={{ width:size, height:size, background:bg, color:fg, fontSize: size*0.36 }}>
      {initials}
    </div>
  );
}

function Button({ children, onClick, variant = "primary", size = "md", className = "", type = "button", disabled, title }){
  const base = "inline-flex items-center justify-center gap-2 font-medium rounded-xl transition-all disabled:opacity-50 disabled:pointer-events-none select-none whitespace-nowrap";
  const sizes = {
    xs: "text-xs px-2.5 py-1.5",
    sm: "text-[13px] px-3 py-1.5",
    md: "text-[14px] px-4 py-2",
    lg: "text-[15px] px-5 py-2.5"
  };
  const variants = {
    primary:  "bg-brand-500 hover:bg-brand-600 text-white shadow-sm hover:shadow-md",
    soft:     "bg-brand-50 hover:bg-brand-100 text-brand-600 dark:bg-brand-900/30 dark:hover:bg-brand-900/50 dark:text-brand-300",
    ghost:    "hover:bg-ink-100/40 text-ink-700 dark:text-ink-300 dark:hover:bg-ink-800/40",
    outline:  "border border-softline hover:bg-canvas text-ink-700 dark:text-ink-300 dark:hover:bg-ink-800",
    danger:   "bg-rose-500 hover:bg-rose-600 text-white",
    dangerSoft:"bg-rose-50 hover:bg-rose-100 text-rose-600 dark:bg-rose-900/20"
  };
  return (
    <button type={type} disabled={disabled} title={title} onClick={onClick}
            className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
      {children}
    </button>
  );
}

function IconBtn({ children, onClick, title, className = "" }){
  return (
    <button onClick={onClick} title={title}
            className={`w-9 h-9 rounded-xl flex items-center justify-center text-ink-600 dark:text-ink-400 hover:bg-canvas dark:hover:bg-ink-800/50 transition ${className}`}>
      {children}
    </button>
  );
}

function Card({ title, eyebrow, action, children, className = "", noPad = false }){
  return (
    <div className={`card-host bg-card border border-softline dark:border-ink-800/60 rounded-xl2 shadow-card anim-fade-up ${className}`}>
      {(title || eyebrow || action) && (
        <div className="flex items-start justify-between gap-4 px-6 pt-5 pb-3">
          <div>
            {eyebrow && <div className="h-eyebrow mb-1.5">{eyebrow}</div>}
            {title && <h3 className="font-display font-bold text-[17px] text-ink-900 dark:text-ink-100 leading-tight">{title}</h3>}
          </div>
          {action && <div className="flex items-center gap-2">{action}</div>}
        </div>
      )}
      <div className={noPad ? "" : "px-6 pb-5"}>{children}</div>
    </div>
  );
}

function Input({ value, onChange, placeholder, type = "text", className = "" }){
  return (
    <input type={type} value={value ?? ""} onChange={e => onChange(e.target.value)}
           placeholder={placeholder}
           className={`w-full px-3.5 py-2 text-[14px] rounded-xl ${className}`} />
  );
}
function Textarea({ value, onChange, placeholder, rows = 3, className = "" }){
  return (
    <textarea value={value ?? ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
              className={`w-full px-3.5 py-2 text-[14px] rounded-xl resize-y ${className}`} />
  );
}
function Select({ value, onChange, options, placeholder, className = "" }){
  // Only render the placeholder option if the options list doesn't already include
  // an empty value, otherwise the dropdown shows two blank entries.
  const hasEmptyOption = options.some(o => (typeof o === "string" ? o : o.value) === "");
  return (
    <select value={value ?? ""} onChange={e => onChange(e.target.value)}
            className={`w-full px-3 py-2 text-[14px] rounded-xl ${className}`}>
      {placeholder && !hasEmptyOption && <option value="">{placeholder}</option>}
      {options.map(o => typeof o === "string"
        ? <option key={o} value={o}>{o === "" ? (placeholder || "None") : o}</option>
        : <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
}

function Pill({ children, tone = "neutral", className = "" }){
  const tones = {
    neutral: "bg-ink-100/60 text-ink-700 dark:bg-ink-800/60 dark:text-ink-300",
    brand:   "bg-brand-50 text-brand-600 dark:bg-brand-900/30 dark:text-brand-300",
    violet:  "bg-violet-50 text-violet-600 dark:bg-violet-900/20 dark:text-violet-300",
    teal:    "bg-teal-50 text-teal-600 dark:bg-teal-100/20 dark:text-teal-100",
    rose:    "bg-rose-50 text-rose-600 dark:bg-rose-900/20 dark:text-rose-300",
    amber:   "bg-amber2-50 text-amber2-600 dark:bg-amber2-900/20 dark:text-amber2-100",
    sky:     "bg-sky2-50 text-sky2-600 dark:bg-sky2-900/20 dark:text-sky2-100",
    success: "bg-emerald-50 text-emerald-600 dark:bg-emerald-900/20 dark:text-emerald-300"
  };
  return <span className={`pill ${tones[tone] || tones.neutral} ${className}`}>{children}</span>;
}

const STATUS_TONE = {
  "Active": "success",
  "On Leave": "amber",
  "Training": "sky"
};
// Restriction pills — all amber-ish "needs watching" except suspension
const RESTRICTION_TONE = {
  "Secondment": "brand",
  "Long-term sick": "rose",
  "Attachment": "violet",
  "Restricted/Suspended": "rose"
};
const PRIO_TONE = { high: "rose", medium: "amber", low: "neutral" };

function StatusBadge({ value }){
  return <Pill tone={STATUS_TONE[value] || "neutral"}>{value}</Pill>;
}
// A small pill for an active restriction, with its end date if known
function RestrictionBadge({ restriction }){
  if (!restriction || !restriction.type) return null;
  const end = restriction.endDate ? ` · to ${fmt.date(restriction.endDate)}` : "";
  return <Pill tone={RESTRICTION_TONE[restriction.type] || "amber"}>{restriction.type}{end}</Pill>;
}
function PriorityBadge({ value }){
  return <Pill tone={PRIO_TONE[value] || "neutral"}>{value}</Pill>;
}

function Modal({ open, onClose, title, children, size = "md", footer }){
  React.useEffect(() => {
    if (!open) return;
    const h = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!open) return null;
  const widths = { sm: "max-w-md", md: "max-w-2xl", lg: "max-w-4xl", xl: "max-w-6xl" };
  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center modal-backdrop p-4 anim-fade">
      <div className={`bg-card rounded-2xl shadow-pop border border-softline dark:border-ink-800 w-full ${widths[size]} max-h-[92vh] flex flex-col anim-fade-up overflow-hidden`}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-softline dark:border-ink-800">
          <h3 className="font-display font-bold text-[18px] text-ink-900 dark:text-ink-100">{title}</h3>
          <IconBtn onClick={onClose} title="Close"><Ic.x width="18" height="18"/></IconBtn>
        </div>
        <div className="px-6 py-5 overflow-y-auto">{children}</div>
        {footer && <div className="px-6 py-4 border-t border-softline dark:border-ink-800 bg-canvas/50 dark:bg-ink-900/30 flex items-center justify-end gap-2">{footer}</div>}
      </div>
    </div>
  );
}

function TrendChip({ value, suffix = "%", positive }){
  const pos = positive ?? (value >= 0);
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11.5px] font-semibold ${pos ? "bg-emerald-50 text-emerald-600 dark:bg-emerald-900/20 dark:text-emerald-300" : "bg-rose-50 text-rose-600 dark:bg-rose-900/20 dark:text-rose-300"}`}>
      {pos ? <Ic.arrowUp width="11" height="11"/> : <Ic.arrowDown width="11" height="11"/>}
      <span className="tnum">{Math.abs(value)}{suffix}</span>
    </span>
  );
}

function KpiCard({ icon, iconTone, label, value, trend, suffix }){
  const tones = {
    brand:  "bg-brand-50 text-brand-500",
    violet: "bg-violet-50 text-violet-500",
    teal:   "bg-teal-50 text-teal-500",
    rose:   "bg-rose-50 text-rose-500",
    amber:  "bg-amber2-50 text-amber2-500",
    sky:    "bg-sky2-50 text-sky2-500"
  };
  return (
    <div className="card-host bg-card border border-softline dark:border-ink-800/60 rounded-xl2 shadow-card p-5 anim-fade-up">
      <div className="flex items-start justify-between mb-4">
        <div className={`w-11 h-11 rounded-xl flex items-center justify-center ${tones[iconTone] || tones.brand}`}>
          {icon}
        </div>
        {trend != null && <TrendChip value={trend} suffix={suffix || "%"} />}
      </div>
      <div className="text-[12.5px] text-ink-500 mb-1">{label}</div>

function TagInput({ value = [], onChange, suggestions = [], placeholder = "Add tag…" }){
  const [text, setText] = React.useState("");
  const add = (raw) => {
    const v = (raw || text).trim();
    if (!v) return;
    if (!value.includes(v)) onChange([...value, v]);
    setText("");
  };
  const remove = (t) => onChange(value.filter(x => x !== t));
  const list = (suggestions || []).filter(s => !value.includes(s) && (text === "" || s.toLowerCase().includes(text.toLowerCase()))).slice(0, 6);
  return (
    <div>
      <div className="flex flex-wrap gap-1.5 mb-2">
        {value.map(t => (
          <span key={t} className="pill bg-brand-50 text-brand-600 dark:bg-brand-900/30 dark:text-brand-300 gap-1.5">
            {t}
            <button onClick={() => remove(t)} className="hover:opacity-70"><Ic.x width="11" height="11"/></button>
          </span>
        ))}
      </div>
      <div className="relative">
        <input value={text} onChange={e => setText(e.target.value)}
               onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); add(); } }}
               placeholder={placeholder} className="w-full px-3 py-2 text-[13px] rounded-xl" />
        {text && list.length > 0 && (
          <div className="absolute top-full left-0 right-0 mt-1 bg-card border border-softline dark:border-ink-800 rounded-xl shadow-lift z-20 overflow-hidden">
            {list.map(s => (
              <button key={s} onClick={() => add(s)}

function ChartView({ type, data, options, height = 240 }){
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) { chartRef.current.destroy(); }
    const isDark = document.documentElement.classList.contains("dark");
    const ink500 = isDark ? "#8B91A4" : "#6B7180";
    const grid   = isDark ? "rgba(255,255,255,.06)" : "rgba(15,19,32,.05)";
    const merged = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: ink500, font: { family: 'Carlito', size: 11 }, boxWidth: 10, boxHeight: 10, usePointStyle: true, pointStyle: "circle" }, position: type === "doughnut" ? "right" : "top", align: "end" },
        tooltip: { backgroundColor: isDark ? "#1A1F2E" : "#0F1320", padding: 10, cornerRadius: 8, titleFont: { family: 'Carlito', weight: "600" }, bodyFont: { family: 'Carlito' } }
      },
      scales: type === "doughnut" ? undefined : {
        x: { grid: { display: false, drawBorder: false }, ticks: { color: ink500, font: { family: 'Carlito', size: 11 } } },
        y: { grid: { color: grid, drawBorder: false }, ticks: { color: ink500, font: { family: 'Carlito', size: 11 } }, beginAtZero: true }
      },
      ...options
    };
    chartRef.current = new Chart(ref.current, { type, data, options: merged });
    return () => chartRef.current && chartRef.current.destroy();
  }, [type, JSON.stringify(data), JSON.stringify(options), document.documentElement.classList.contains("dark")]);
  return <div style={{ height }}><canvas ref={ref}/></div>;
}

/* =========================================================================
   STAFFING PROJECTION
   Headcount over a rolling window. A staff member counts toward a month if:
     - they had started by that month (startedDate null = always started), and
     - they had not yet left (endDate null = still serving, or endDate after that month).
   Months before "now" are actuals; months after are projections driven by endDates.
   ========================================================================= */
function buildStaffingSeries(staff, monthsBack = 12, monthsForward = 6){
  // Build the list of month buckets (first of each month)
  const now = new Date();
  const months = [];
  for (let i = monthsBack; i >= -monthsForward; i--){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d);
  }
  // For a given month-start, is this person on strength?
  // Restricted staff (secondment, long-term sick, etc.) are NOT counted toward active
  // strength for the duration of the restriction.
  const onStrength = (s, monthStart) => {
    if (s.resigned) {
      // resigned people: only count if they had an endDate after this month, else off
      if (!s.endDate) return false;
    }
    const started = s.startedDate ? new Date(s.startedDate) : null;
    const ended = s.endDate ? new Date(s.endDate) : null;
    // monthEnd = last moment of that month
    const monthEnd = new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 0, 23, 59, 59);
    if (started && started > monthEnd) return false;       // not yet joined
    if (ended && ended < monthStart) return false;          // already left
    // off-strength while on a restriction that's still running at this month
    if (isOnRestriction(s, monthEnd)) return false;
    return true;
  };
  const nowMonthIdx = monthsBack;  // index of the current month
  return { months, onStrength, nowMonthIdx };
}

function OverviewView({ onNav }){
  const { store } = useStore();
  const { staff, tasks, settings } = store;

  const todayKey = startOfDayIso();
  const isToday = (iso) => iso && iso.slice(0, 10) === todayKey.slice(0, 10);

  // --- TODAY: tasks and chasers due today or overdue ---
  const todayItems = React.useMemo(() => {
    return tasks
      .filter(t => !t.completed && t.dueDate)
      .filter(t => {
        const d = new Date(t.dueDate);
        return d <= new Date(); // today or earlier (overdue rolls into "today's attention")
      })
      .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
  }, [tasks]);
  const dueTodayCount = todayItems.filter(t => isToday(t.dueDate)).length;
  const overdueCount = todayItems.length - dueTodayCount;

  // --- KPIs ---
  // On-strength = not resigned and not currently on a restriction
  const activeStaff = staff.filter(s => !s.resigned && !isOnRestriction(s));
  const restrictedStaff = staff.filter(s => !s.resigned && isOnRestriction(s));
  const totalPersonnel = activeStaff.length;
  const activeTasks = tasks.filter(t => !t.completed).length;

  // Capability coverage: % of (staff × capability) cells marked "yes"
  const capCoverage = React.useMemo(() => {
    let denom = 0, yes = 0;
    activeStaff.forEach(p => {
      CAPABILITIES.forEach(cap => {
        denom++;
        if ((p.capabilities || {})[cap.key] === "yes") yes++;
      });
    });
    return denom === 0 ? 0 : Math.round((yes / denom) * 100);
  }, [staff]);

  const notInImport = staff.filter(s => !s.resigned && s.inLatestImport === false).length;

  // --- STAFFING PROJECTION GRAPH ---
  // Solid bold lines per active hub, plus thinner team totals so you can see both
  // the hub trajectory and the team breakdown on one chart.
  const staffing = React.useMemo(() => {
    const { months, onStrength, nowMonthIdx } = buildStaffingSeries(staff, 12, 6);
    const labels = months.map(d => d.toLocaleDateString("en-GB", { month: "short", year: "2-digit" }));

    const archived = settings.archivedHubs || [];
    const hubs = (settings.hubs || HUBS).filter(h =>
      !archived.includes(h) && staff.some(s => s.hub === h));
    const teams = (settings.teams || TEAMS).filter(t => staff.some(s => s.team === t));

    // Hub lines — solid, bold, primary palette
    const hubSets = hubs.map((hub, ci) => {
      const data = months.map(m => staff.filter(s => s.hub === hub && onStrength(s, m)).length);
      const color = CHART_PALETTE[ci % CHART_PALETTE.length];
      return {
        label: `${hub} (hub)`, data,
        borderColor: color, backgroundColor: "transparent",
        tension: .3, borderWidth: 2.5,
        pointRadius: data.map((_, i) => i === nowMonthIdx ? 4 : 0),
        pointBackgroundColor: color,
        segment: { borderDash: ctx => ctx.p0DataIndex >= nowMonthIdx ? [5, 4] : undefined }
      };
    });

    // Team lines — thinner, slightly muted, drawn on top of the hub lines
    const TEAM_COLORS = ["#0EAB94", "#E89A1C", "#7F8E9F", "#C2410C"];  // teal/amber/slate/orange
    const teamSets = teams.map((team, ci) => {
      const data = months.map(m => staff.filter(s => s.team === team && onStrength(s, m)).length);
      const color = TEAM_COLORS[ci % TEAM_COLORS.length];
      return {
        label: `${team} (team)`, data,
        borderColor: color, backgroundColor: "transparent",
        tension: .3, borderWidth: 1.6, borderDash: [3, 3],
        pointRadius: 0,
        pointBackgroundColor: color
      };
    });

    return { labels, datasets: [...hubSets, ...teamSets], nowMonthIdx };
  }, [staff, settings.hubs, settings.archivedHubs, settings.teams]);

  // Hub × team breakdown for the strength cards: current headcount per hub,
  // with each team's contribution shown underneath. Restricted staff already
  // excluded because activeStaff filters them out.
  const hubLevels = React.useMemo(() => {
    const archived = settings.archivedHubs || [];
    const teams = settings.teams || TEAMS;
    return (settings.hubs || HUBS)
      .filter(h => !archived.includes(h))
      .map(hub => {
        const inHub = activeStaff.filter(s => s.hub === hub);
        const current = inHub.length;
        const max = (settings.maxHubSizes || {})[hub] || 0;
        const pct = max > 0 ? Math.round((current / max) * 100) : null;
        // Breakdown by team within this hub
        const byTeam = teams.map(t => ({ team: t, count: inHub.filter(s => s.team === t).length }));
        return { hub, current, max, pct, byTeam };
      });
  }, [staff, settings.hubs, settings.archivedHubs, settings.maxHubSizes, settings.teams]);

  // Upcoming open tasks (next 6, excludes chasers which have their own strip)
  const upcoming = tasks
    .filter(t => !t.completed && t.dueDate && !t.isChaser)
    .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate))
    .slice(0, 6);

  // Returning from a restriction within the next 60 days — back on strength soon.
  const returningSoon = React.useMemo(() => {
    return staff
      .filter(s => !s.resigned && s.restriction && s.restriction.type && s.restriction.endDate)
      .map(s => ({ staff: s, days: daysBetween(startOfDayIso(), s.restriction.endDate) }))
      .filter(x => x.days != null && x.days >= 0 && x.days <= 60)
      .sort((a, b) => a.days - b.days)
      .slice(0, 5);
  }, [staff]);

  return (
    <div className="px-8 py-6 space-y-6 overflow-y-auto h-full app-bg">
      {/* TODAY strip */}
      <Card title="Today" eyebrow={new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" })}
            action={<Button size="xs" variant="ghost" onClick={() => onNav("tasks")}>Open tasks <Ic.chevR width="11" height="11"/></Button>}>
        {todayItems.length === 0 ? (
          <div className="py-6 text-center text-[13px] text-ink-500">Nothing due today, and nothing overdue. A clear run.</div>
        ) : (
          <>
            <div className="flex items-center gap-4 mb-3 text-[12.5px]">
              {dueTodayCount > 0 && <span className="text-ink-700 dark:text-ink-300"><span className="font-bold tnum">{dueTodayCount}</span> due today</span>}
              {overdueCount > 0 && <span className="text-rose-600 dark:text-rose-400"><span className="font-bold tnum">{overdueCount}</span> overdue</span>}
            </div>
            <div className="space-y-1.5">
              {todayItems.slice(0, 6).map(t => {
                const cls = classifyTask(t);
                const who = t.isChaser
                  ? `${(t.assigneeIds || []).length} staff`
                  : (staff.find(s => s.id === t.assigneeId)?.name || "Unassigned");
                return (
                  <div key={t.id} className="flex items-center gap-3 p-2.5 rounded-xl hover:bg-canvas dark:hover:bg-ink-900/40 transition">

                    <div className="text-[11.5px] text-ink-500 shrink-0">{who}</div>

            </div>

      {/* KPI row */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

        <KpiCard iconTone="violet" icon={<Ic.task width="20" height="20"/>}     label="Open tasks"          value={activeTasks} />
        <KpiCard iconTone="teal"   icon={<Ic.shield width="20" height="20"/>}   label="Capability coverage" value={capCoverage + "%"} positive={capCoverage >= 50}/>
        <KpiCard iconTone="amber"  icon={<Ic.bell width="20" height="20"/>}     label="Due or overdue"      value={todayItems.length} positive={todayItems.length === 0}/>

          <Ic.upload width="18" height="18" className="text-amber2-600 shrink-0"/>
          <div className="flex-1 text-[13px] text-ink-700 dark:text-ink-300">
            <span className="font-semibold">{notInImport} officer{notInImport === 1 ? "" : "s"}</span> not in your latest spreadsheet import — kept and flagged, not deleted.

          <span className="text-[12px] font-semibold text-amber2-600">Review →</span>
        </button>

      {restrictedStaff.length > 0 && (
        <button onClick={() => onNav("staff")}
                className="w-full text-left flex items-center gap-3 px-4 py-3 rounded-xl bg-canvas dark:bg-ink-900/40 border border-softline dark:border-ink-800 hover:shadow-card transition">
          <Ic.alert width="18" height="18" className="text-ink-500 shrink-0"/>
          <div className="flex-1 text-[13px] text-ink-700 dark:text-ink-300">
            <span className="font-semibold">{restrictedStaff.length}</span> on a restriction — secondment, long-term sick, attachment or suspension. Not counted in strength.
          </div>
          <div className="flex items-center gap-1.5">
            {restrictedStaff.slice(0, 4).map(s => <RestrictionBadge key={s.id} restriction={s.restriction}/>)}
            {restrictedStaff.length > 4 && <span className="text-[12px] text-ink-500">+{restrictedStaff.length - 4}</span>}
          </div>
        </button>
      )}

      {/* STAFFING PROJECTION — the headline chart */}
      <Card title="Staffing levels" eyebrow="12 months back, 6 projected">
        <div className="text-[12px] text-ink-500 mb-3">
          Solid lines per hub, dotted lines per team. Bold marker is today; the dashed projection runs forward from recorded leaving dates.
        </div>
        <ChartView type="line"
          data={{ labels: staffing.labels, datasets: staffing.datasets }}
          options={{ plugins: { legend: { position: "top", align: "end" } }, interaction: { mode: "index", intersect: false } }}
          height={300}
        />
        {/* Hub level bars */}
        <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {hubLevels.map(h => {
            const under = h.pct != null && h.pct < 85;
            const over = h.pct != null && h.pct > 100;
            return (
              <div key={h.hub} className="p-3 rounded-xl bg-canvas dark:bg-ink-900/40">
                <div className="flex items-center justify-between mb-1.5">
                  <div className="text-[12.5px] font-semibold text-ink-700 dark:text-ink-300">{h.hub}</div>
                  <div className="text-[12px] tnum text-ink-500">
                    {h.current}{h.max ? ` / ${h.max}` : ""} {h.pct != null && <span className={under ? "text-rose-500 font-semibold" : over ? "text-amber2-600 font-semibold" : "text-emerald-600 font-semibold"}>· {h.pct}%</span>}
                  </div>
                </div>
                <div className="h-2 rounded-full bg-card dark:bg-ink-800 overflow-hidden">
                  <div className={`h-full rounded-full ${under ? "bg-rose-500" : over ? "bg-amber2-500" : "bg-emerald-500"}`}
                       style={{ width: Math.min(100, h.pct || 0) + "%", transition: "width .6s ease" }}/>
                </div>
                {/* Team breakdown within this hub — read as "Response 12 · Investigations 5" */}
                {h.byTeam && h.byTeam.length > 0 && (
                  <div className="mt-2 flex flex-wrap gap-x-3 gap-y-0.5 text-[11px] text-ink-500">
                    {h.byTeam.map(t => (
                      <span key={t.team}><span className="text-ink-700 dark:text-ink-300 font-semibold">{t.count}</span> {t.team}</span>
                    ))}
                  </div>
                )}
                {h.max === 0 && <div className="text-[11px] text-ink-400 mt-1">No target set — add one in Settings.</div>}
              </div>
            );

        </div>
      </Card>

      {/* Row: coming up + renewals */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <Card title="Coming up" eyebrow="Next open tasks"
              action={<Button size="xs" variant="ghost" onClick={() => onNav("tasks")}>All tasks <Ic.chevR width="11" height="11"/></Button>}>
          {upcoming.length === 0 ? (
            <div className="py-8 text-center text-[13px] text-ink-500">No open tasks. Nice.</div>
          ) : (
            <div className="space-y-2">
              {upcoming.map(t => {
                const cls = classifyTask(t);
                const assignee = staff.find(s => s.id === t.assigneeId);
                return (
                  <div key={t.id} className="flex items-center gap-3 p-3 rounded-xl hover:bg-canvas dark:hover:bg-ink-900/40 transition">
                    <div className={`w-1 self-stretch rounded ${cls === "overdue" ? "bg-rose-500" : cls === "soon" ? "bg-amber2-500" : "bg-brand-300"}`}></div>
                    <div className="flex-1 min-w-0">
                      <div className="font-medium text-[13.5px] text-ink-900 dark:text-ink-100 truncate">{t.title}</div>
                      <div className="text-[11.5px] text-ink-500 mt-0.5">{assignee?.name || "Unassigned"} · {fmt.date(t.dueDate)}</div>
                    </div>
                    {cls === "overdue" && <Pill tone="rose">Overdue</Pill>}
                    {cls === "soon" && <Pill tone="amber">Due soon</Pill>}
                  </div>
                );
              })}
            </div>
          )}
        </Card>

        <Card title="Returning soon" eyebrow="Off a restriction within 60 days"
              action={<Button size="xs" variant="ghost" onClick={() => onNav("staff")}>Staff <Ic.chevR width="11" height="11"/></Button>}>
          {returningSoon.length === 0 ? (
            <div className="py-8 text-center text-[13px] text-ink-500">Nobody due back from a restriction soon.</div>
          ) : (
            <div className="space-y-2">
              {returningSoon.map(({ staff: p, days }) => {
                const tone = days <= 14 ? "rose" : days <= 30 ? "amber" : "sky";
                return (
                  <div key={p.id} className="flex items-center gap-3 p-2.5 rounded-xl hover:bg-canvas dark:hover:bg-ink-900/40 transition">
                    <Avatar name={p.name} photoId={p.photoId} size={32}/>
                    <div className="flex-1 min-w-0">
                      <div className="font-medium text-[13px] text-ink-900 dark:text-ink-100 truncate"><StaffNameLink staff={p}/></div>
                      <div className="text-[11.5px] text-ink-500 truncate">{p.restriction.type} · ends {fmt.date(p.restriction.endDate)}</div>
                    </div>
                    <Pill tone={tone}>{days}d</Pill>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

/* =========================================================================
